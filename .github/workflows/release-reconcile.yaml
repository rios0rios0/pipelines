# see the bottom of the file for more information¹
# the parent workflow is responsible for setting up the call events²
on:
  workflow_call:
    inputs:
      changelog_path:
        type: 'string'
        required: false
        default: 'CHANGELOG.md'
        description: 'Path to the changelog to reconcile against the git tags.'
      auto_recover:
        type: 'boolean'
        required: false
        default: true
        description: 'When true, push the missing version tags so the tag-push delivery path re-cuts the releases. A tag pushed with the default GITHUB_TOKEN does NOT start workflows, so pass recover_token (a PAT) to actually re-trigger delivery; without it the tags are still created (enough for tag-driven ecosystems such as Go modules / Packagist) and the gap is reported.'
    secrets:
      recover_token:
        required: false
        description: 'Personal access token used to check out and push recovery tags so they re-trigger the delivery pipeline. Falls back to GITHUB_TOKEN when absent.'

permissions:
  contents: 'write' # push recovery tags
  issues: 'write' # open/update the tracking issue

jobs:
  reconcile:
    name: 'delivery > reconcile'
    runs-on: 'ubuntu-latest'
    steps:
      - name: 'Checkout code'
        uses: 'actions/checkout@v6'
        with:
          fetch-depth: 0
          fetch-tags: true
          token: "${{ secrets.recover_token || github.token }}"

      - name: 'Checkout scripts'
        uses: 'rios0rios0/pipelines/github/global/abstracts/scripts-repo@main'

      - name: 'Reconcile releases'
        shell: 'bash'
        env:
          GH_TOKEN: "${{ github.token }}"
          AUTO_RECOVER: "${{ inputs.auto_recover }}"
          CHANGELOG_PATH: "${{ inputs.changelog_path }}"
        run: |
          set -euo pipefail

          gaps="$("$SCRIPTS_DIR/global/scripts/shared/reconcile-releases.sh" . "$CHANGELOG_PATH")"
          if [ -z "$gaps" ]; then
            echo "No release cut-off gaps detected — CHANGELOG and tags agree."
            exit 0
          fi

          echo "Release cut-off gaps detected:"
          echo "$gaps"

          body="$(printf 'A scheduled release reconciliation found CHANGELOG version(s) with no matching git tag — the pipeline likely failed on the bump merge to main, so the release was never cut. See the [autobump-release-cutoff runbook](https://github.com/rios0rios0/pipelines#release-reconciliation).\n\n| Version | Bump commit | Action taken |\n| --- | --- | --- |')"
          recovered=0
          while IFS="$(printf '\t')" read -r version sha status; do
            [ -n "$version" ] || continue
            action='needs manual review (no bump commit found)'
            if [ "$status" = 'recoverable' ]; then
              if [ "$AUTO_RECOVER" = 'true' ]; then
                if git tag "$version" "$sha" 2>/dev/null && git push origin "refs/tags/$version" 2>/dev/null; then
                  action='tag pushed — delivery re-triggered'
                  recovered=$((recovered + 1))
                else
                  action='tag push failed — investigate'
                fi
              else
                action='recoverable — re-push the tag to re-cut the release'
              fi
            fi
            body="$(printf '%s\n| `%s` | `%s` | %s |' "$body" "$version" "$(printf '%s' "$sha" | cut -c1-8)" "$action")"
          done <<EOF
          $gaps
          EOF

          echo "Recovered $recovered tag(s)."

          title='Release reconciliation: version(s) missing a tag'
          existing="$(gh issue list --repo "$GITHUB_REPOSITORY" --state open --search "$title in:title" --json number --jq '.[0].number // empty' || true)"
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --repo "$GITHUB_REPOSITORY" --body "$body"
          else
            gh issue create --repo "$GITHUB_REPOSITORY" --title "$title" --body "$body"
          fi


# 1 - this file MUST be inside ".github/workflows" because of GitHub Actions limitations
# 2 - the recommended event to trigger this workflow and permissions are:
#   on:
#     schedule:
#       - cron: '0 6 * * 1' # weekly, Monday 06:00 UTC
#     workflow_dispatch:
#
#   permissions:
#     contents: 'write' # push recovery tags
#     issues: 'write' # open/update the tracking issue
#
# This workflow diffs the released CHANGELOG.md versions against the git tags and,
# for every version whose release was never cut, (re-)pushes its tag so the
# tag-push delivery path (see github/global/stages/40-delivery/release) re-cuts the
# release. It always opens/updates a tracking issue summarising the gaps.
