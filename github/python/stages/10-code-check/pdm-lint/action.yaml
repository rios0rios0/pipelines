inputs:
  python_version:
    required: false
    default: '3.13'
    description: 'Python version to use'
  command:
    required: true
    description: 'PDM command to run (e.g., "isort --check-only .", "black --check .")'

runs:
  using: 'composite'
  steps:
    - name: 'Checkout code'
      uses: 'actions/checkout@v6'

    - name: 'Setup Python'
      uses: 'actions/setup-python@v6'
      with:
        python-version: '${{ inputs.python_version }}'

    - name: 'Install PDM and dependencies'
      run: |
        python -m pip install pdm
        pdm install -v
      shell: 'bash'

    - name: 'Run lint command'
      run: pdm run ${{ inputs.command }}
      shell: 'bash'
