parameters:
  - name: 'GRADLE_TEST_TASKS'
    type: 'object'
    default: []
  - name: 'GRADLE_PROPERTIES'
    type: 'object'
    default: []

stages:
 - stage: 'code_check'
   displayName: 'code check (style/quality)'
   condition: not(startsWith(variables['Build.SourceBranch'], 'refs/tags/'))
   jobs:
     - template: '../../../global/stages/10-code-check/basic-checks.yaml'

     - template: '../../abstracts/code-check.yaml'
       parameters:
          GRADLE_TEST_TASKS: ${{ parameters.GRADLE_TEST_TASKS }}
          GRADLE_PROPERTIES: ${{ parameters.GRADLE_PROPERTIES }}

     - job: 'quality_proguard'
       displayName: 'quality:proguard'
       steps:
         - template: '../../abstracts/gradle.yaml'
         - script: |
             ./gradlew classes --quiet
             wget -q "https://github.com/Guardsquare/proguard/releases/download/v7.6.1/proguard-7.6.1.tar.gz" -O /tmp/proguard.tar.gz
             tar xzf /tmp/proguard.tar.gz -C /tmp
             INPUT_JAR=$(find . -path "*/build/libs/*.jar" -not -name "*-sources.jar" -not -name "*-javadoc.jar" | head -1)
             if [ -z "$INPUT_JAR" ]; then INPUT_JAR=$(find . -path "*/build/classes/java/main" -type d | head -1); fi
             if [ -z "$INPUT_JAR" ]; then echo "No compiled classes found"; exit 0; fi
             java -jar /tmp/proguard-7.6.1/lib/proguard.jar \
               -injars "$INPUT_JAR" -outjars /dev/null \
               -libraryjars "$JAVA_HOME/jmods/java.base.jmod(!**.jar;!module-info.class)" \
               -dontoptimize -dontobfuscate -dontwarn \
               -keep "public class * { public static void main(java.lang.String[]); }" \
               -keep "public class * { public protected *; }" \
               -printusage proguard-usage.txt
             cat proguard-usage.txt
           displayName: 'Run ProGuard dead code analysis'
       continueOnError: true
