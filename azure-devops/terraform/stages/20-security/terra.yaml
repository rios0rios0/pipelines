parameters:
  # Steps forwarded to the Terraform SAST jobs (`sast:semgrep`, `sast:trivy`)
  # so consumers can configure SSH for private Terraform module cloning
  # before each scanner's parser walks `source = "git@..."` references.
  # Mirrors the `PRE_STEPS` hook already accepted by `azure-devops/terra/`.
  - name: 'PRE_STEPS'
    type: 'stepList'
    default: []

stages:
  - stage: 'security'
    displayName: 'security (sca/sast)'
    condition: and(succeeded(), not(startsWith(variables['Build.SourceBranch'], 'refs/tags/')))
    jobs:
      - template: '../../../global/stages/20-security/docker.yaml'
        parameters:
          SEMGREP_LANGUAGE: 'terraform'
          PRE_STEPS: ${{ parameters.PRE_STEPS }}

      - template: '../../../global/stages/20-security/hadolint.yaml'

      - template: '../../../global/stages/20-security/trivy.yaml'
        parameters:
          PRE_STEPS: ${{ parameters.PRE_STEPS }}

      - template: '../../../global/stages/20-security/trivy-sca.yaml'
