# Terra CLI pipeline — uses the terra CLI (https://github.com/rios0rios0/terra)
# which wraps Terraform and Terragrunt. Provides code check, security, tests,
# and management stages. Delivery is intentionally excluded because it is
# project-specific (plan/apply targets, environment handling, stack ordering).
#
# see the bottom of the file for more information¹
# the parent workflow is responsible for setting up the call events²
on:
  workflow_call:
    inputs:
      pre_script:
        required: false
        type: 'string'
        default: ''
        description: 'Shell commands run before Trivy and Semgrep. Useful for configuring SSH so the Terraform parser can clone private modules referenced via `source = "git@..."`.'

jobs:
  # first stage
  code_check-basic_checks:
    name: 'code-check > quality:basic-checks'
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'rios0rios0/pipelines/github/global/stages/10-code-check/basic-checks@main'
        with:
          target_branch: ${{ github.event.pull_request.base.ref || github.event.repository.default_branch || 'main' }}
    if: "github.event_name == 'pull_request'"

  code_check-style_terra_format:
    name: 'code-check > style:terra-format'
    runs-on: 'ubuntu-latest'
    steps:
      - name: 'Checkout code'
        uses: 'actions/checkout@v6'

      - name: 'Setup Go'
        uses: 'actions/setup-go@v6'
        with:
          go-version: '1.24'

      - name: 'Install terra CLI'
        run: |
          curl -fsSL https://raw.githubusercontent.com/rios0rios0/terra/main/install.sh | sh
          terra install
        shell: 'bash'

      - name: 'Check formatting'
        run: |
          terra format
          git diff --exit-code
        shell: 'bash'
    if: "!startsWith(github.ref, 'refs/tags/')"

  code_check-style_tflint:
    name: 'code-check > style:tflint'
    runs-on: 'ubuntu-latest'
    steps:
      - name: 'Checkout code'
        uses: 'actions/checkout@v6'

      - name: 'Install TFLint'
        run: curl -s https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash
        shell: 'bash'

      - name: 'Run TFLint'
        run: tflint --chdir . --recursive
        shell: 'bash'
    continue-on-error: true
    if: "!startsWith(github.ref, 'refs/tags/')"


  # second stage
  security-sast_codeql:
    name: 'security > sast:codeql'
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'rios0rios0/pipelines/github/global/stages/20-security/codeql@main'
        with:
          codeql_language: 'hcl'
    needs: [ 'code_check-style_terra_format' ]
    continue-on-error: true
    if: "!startsWith(github.ref, 'refs/tags/')"

  security-sast_semgrep:
    name: 'security > sast:semgrep'
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'rios0rios0/pipelines/github/global/stages/20-security/docker-semgrep@main'
        with:
          semgrep_lang: 'terraform'
          pre_script: ${{ inputs.pre_script }}
    needs: [ 'code_check-style_terra_format' ]
    if: "!startsWith(github.ref, 'refs/tags/')"

  security-sast_gitleaks:
    name: 'security > sast:gitleaks'
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'rios0rios0/pipelines/github/global/stages/20-security/docker-gitleaks@main'
    needs: [ 'code_check-style_terra_format' ]
    if: "!startsWith(github.ref, 'refs/tags/')"

  security-sast_hadolint:
    name: 'security > sast:hadolint'
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'rios0rios0/pipelines/github/global/stages/20-security/hadolint@main'
    needs: [ 'code_check-style_terra_format' ]
    continue-on-error: true
    if: "!startsWith(github.ref, 'refs/tags/')"

  security-sast_trivy:
    name: 'security > sast:trivy'
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'rios0rios0/pipelines/github/global/stages/20-security/trivy@main'
        with:
          pre_script: ${{ inputs.pre_script }}
    needs: [ 'code_check-style_terra_format' ]
    continue-on-error: true
    if: "!startsWith(github.ref, 'refs/tags/')"

  security-sca_trivy:
    name: 'security > sca:trivy'
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'rios0rios0/pipelines/github/global/stages/20-security/trivy-sca@main'
    needs: [ 'code_check-style_terra_format' ]
    continue-on-error: true
    if: "!startsWith(github.ref, 'refs/tags/')"


  # third stage
  # Single unified job that orchestrates both tiers of Terraform testing
  # behind one `test:all` entry: native `terraform test` over
  # `modules/*/tests/*.tftest.hcl` (tier 1) followed by the Go Terratest
  # suite under `tests/terratest/` (tier 2). The runner auto-detects which
  # tiers the consumer has, runs only those, and exits 0 when neither is
  # present — so stack-only repos (no `modules/` tests, no `tests/terratest/`)
  # pass the stage without a bespoke opt-out.
  tests-test_all:
    name: 'tests > test:all'
    runs-on: 'ubuntu-latest'
    env:
      REPORT_PATH: 'build/reports'
    steps:
      - name: 'Checkout code'
        uses: 'actions/checkout@v6'

      # Go 1.24 is a lower bound — `GOTOOLCHAIN=auto` (the Go 1.21+ default)
      # auto-fetches a newer toolchain when the consumer's `go.mod` under
      # `tests/terratest/` requires one (Terratest suites frequently pin
      # `go 1.26`+).
      - name: 'Setup Go'
        uses: 'actions/setup-go@v6'
        with:
          go-version: '1.24'

      - name: 'Install terra CLI'
        run: |
          curl -fsSL https://raw.githubusercontent.com/rios0rios0/terra/main/install.sh | sh
          terra install
        shell: 'bash'

      - name: 'Checkout pipelines repo for shared scripts'
        uses: 'actions/checkout@v6'
        with:
          repository: 'rios0rios0/pipelines'
          ref: 'main'
          path: '.pipelines'

      - name: 'Run Terraform tests (terra-test + terratest)'
        run: |
          export SCRIPTS_DIR="$GITHUB_WORKSPACE/.pipelines"
          "$SCRIPTS_DIR/global/scripts/languages/terraform/test-all/run.sh"
        shell: 'bash'

      - name: 'Publish test results'
        if: 'always()'
        uses: 'actions/upload-artifact@v4'
        with:
          name: 'terra-coverage'
          path: "${{ env.REPORT_PATH }}"
          if-no-files-found: 'warn'
    needs: [ 'security-sast_semgrep', 'security-sast_gitleaks', 'security-sast_hadolint', 'security-sast_trivy', 'security-sca_trivy' ]
    if: "!startsWith(github.ref, 'refs/tags/')"


# 1 - this file MUST be inside ".github/workflows" because of GitHub Actions limitations
# 2 - the recommended events to trigger this workflow and permissions are:
