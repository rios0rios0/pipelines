stages:
  - stage: 'code_check'
    displayName: 'code check (style/quality)'
    condition: not(startsWith(variables['Build.SourceBranch'], 'refs/tags/'))
    jobs:
      - template: '../../../global/stages/10-code-check/basic-checks.yaml'

      - job: 'style_terra_format'
        displayName: 'style:terra-format'
        steps:
          - template: '../../abstracts/terra.yaml'

          - script: |
              terra format
              git diff --exit-code
            displayName: 'Check terra formatting (terraform fmt + terragrunt hclfmt)'

      - job: 'style_tflint'
        displayName: 'style:tflint'
        steps:
          - template: '../../abstracts/terra.yaml'

          - script: curl -s https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash
            displayName: 'Install TFLint'

          - script: tflint --chdir . --recursive
            displayName: 'Run TFLint'
