# see the bottom of the file for more information¹
# the parent workflow is responsible for setting up the call events²
on:
  workflow_call:
    outputs:
      tag_name:
        description: 'The tag name created by the release job'
        value: ${{ jobs.delivery-release.outputs.tag_name }}

# it wasn't needed to set up anything for GoLang because 'ubuntu-latest' has all dependencies
jobs:
  # first stage
  code_check-style_golangci_lint:
    name: 'code-check > style:golangci-lint'
    runs-on: 'ubuntu-latest'
    steps:
      - run: sudo apt-get update && sudo apt-get install -y python3 python3-yaml
      - uses: 'rios0rios0/pipelines/github/golang/stages/10-code-check/golangci-lint@main'
    continue-on-error: true
    if: "!startsWith(github.ref, 'refs/tags/')"


  # second stage
  security-sast_codeql:
    name: 'security > sast:codeql'
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'rios0rios0/pipelines/github/global/stages/20-security/codeql@main'
        with:
          codeql_language: 'go'
    needs: [ 'code_check-style_golangci_lint' ]
    if: "!startsWith(github.ref, 'refs/tags/')"

  security-sast_semgrep:
    name: 'security > sast:semgrep'
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'rios0rios0/pipelines/github/global/stages/20-security/docker-semgrep@main'
        with:
          semgrep_lang: 'golang'
    needs: [ 'code_check-style_golangci_lint' ]
    if: "!startsWith(github.ref, 'refs/tags/')"

  security-sast_gitleaks:
    name: 'security > sast:gitleaks'
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'rios0rios0/pipelines/github/global/stages/20-security/docker-gitleaks@main'
    needs: [ 'code_check-style_golangci_lint' ]
    if: "!startsWith(github.ref, 'refs/tags/')"

  security-sast_hadolint:
    name: 'security > sast:hadolint'
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'rios0rios0/pipelines/github/global/stages/20-security/hadolint@main'
    needs: [ 'code_check-style_golangci_lint' ]
    continue-on-error: true
    if: "!startsWith(github.ref, 'refs/tags/')"

  security-sast_trivy:
    name: 'security > sast:trivy'
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'rios0rios0/pipelines/github/global/stages/20-security/trivy@main'
    needs: [ 'code_check-style_golangci_lint' ]
    continue-on-error: true
    if: "!startsWith(github.ref, 'refs/tags/')"

  security-sca_trivy:
    name: 'security > sca:trivy'
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'rios0rios0/pipelines/github/global/stages/20-security/trivy-sca@main'
    needs: [ 'code_check-style_golangci_lint' ]
    continue-on-error: true
    if: "!startsWith(github.ref, 'refs/tags/')"

  security-sca_govulncheck:
    name: 'security > sca:govulncheck'
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'rios0rios0/pipelines/github/golang/stages/20-security/govulncheck@main'
    needs: [ 'code_check-style_golangci_lint' ]
    continue-on-error: true
    if: "!startsWith(github.ref, 'refs/tags/')"


  # third stage
  tests-test_all:
    name: 'tests > test:all'
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'rios0rios0/pipelines/github/golang/stages/30-tests/all@main'
    needs: [ 'security-sast_codeql', 'security-sast_semgrep', 'security-sast_gitleaks', 'security-sast_hadolint', 'security-sast_trivy', 'security-sca_trivy', 'security-sca_govulncheck' ]
    if: "!startsWith(github.ref, 'refs/tags/')"


  # fourth stage
  delivery-release:
    name: 'delivery > release'
    runs-on: 'ubuntu-latest'
    outputs:
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - id: 'release'
        uses: 'rios0rios0/pipelines/github/global/stages/40-delivery/release@main'
    needs: [ 'tests-test_all' ]
    if: "github.event_name == 'push' && github.ref == 'refs/heads/main' && contains(github.event.head_commit.message, 'chore/bump-')"


# 1 - this file MUST be inside ".github/workflows" because of GitHub Actions limitations
# 2- the recommended events to trigger this workflow and permissions are:
# on:
#   push:
#     branches:
#       - 'main'
#     tags:
#       - '*'
#   pull_request:
#     branches:
#       - 'main'
#   workflow_dispatch:
#
# permissions:
#   checks: 'write' # code_check-style_golangci_lint
#   security-events: 'write' # security-sast_codeql
#   contents: 'write' # delivery-release
