inputs:
  pre_script:
    required: false
    default: ''
    description: 'Shell commands run before Trivy. Useful for configuring SSH so the Terraform parser can clone private modules referenced via `source = "git@..."`.'

runs:
  using: 'composite'
  steps:
    - name: 'Checkout code'
      uses: 'actions/checkout@v6'

    - name: 'Get Scripts'
      uses: 'rios0rios0/pipelines/github/global/abstracts/scripts-repo@main'

    - name: 'Pre-steps'
      if: "inputs.pre_script != ''"
      shell: 'bash'
      env:
        PRE_SCRIPT: ${{ inputs.pre_script }}
      run: eval "$PRE_SCRIPT"

    - name: 'Execute'
      shell: 'bash'
      run: $SCRIPTS_DIR/global/scripts/tools/trivy/run.sh

    - name: 'Upload Report'
      uses: 'actions/upload-artifact@v6'
      with:
        name: 'trivy'
        path: 'build/reports/trivy/'
        if-no-files-found: 'error'
        overwrite: 'true'
        retention-days: 10
      if: always()
