parameters:
  - name: 'ADDITIONAL_GRADLE_TASKS'
    type: string
    default: ''
  - name: 'GRADLE_TEST_TASKS'
    type: object
    default: []

stages:
  - stage: 'delivery'
    displayName: 'delivery'
    condition: and(not(failed()), or(startsWith(variables['Build.SourceBranch'], 'refs/tags/'), startsWith(variables['Build.SourceBranch'], 'refs/heads/main')))
    jobs:
      - job: 'delivery'
        displayName: 'delivery'
        variables:
          GRADLE_CACHE_DIR: '$(HOME)/.gradle/caches'
        steps:
          - task: 'Cache@2'
            inputs:
              key: "$(Agent.JobName)|build.gradle"
              path: "$(GRADLE_CACHE_DIR)"
            displayName: 'Cache Gradle'
            continueOnError: true

          - task: 'Gradle@3'
            inputs:
              tasks: 'build'
              ${{ if gt(length(parameters.GRADLE_TEST_TASKS), 0) }}:
              options: "-x ${{ join(' -x ', parameters.GRADLE_TEST_TASKS) }}"
            displayName: 'Gradle Build'

          - task: 'Gradle@3'
            inputs:
              tasks: '${{ parameters.ADDITIONAL_GRADLE_TASKS }}'
            displayName: 'Additional Gradle Tasks'
            condition: ne(variables['ADDITIONAL_GRADLE_TASKS'], '')

      - template: '../../../global/stages/40-delivery/release.yaml'
