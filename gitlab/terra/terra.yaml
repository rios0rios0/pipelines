# Terra CLI pipeline — uses the terra CLI (https://github.com/rios0rios0/terra)
# which wraps Terraform and Terragrunt. Provides code check, security, tests,
# and management stages. Delivery is intentionally excluded because it is
# project-specific (plan/apply targets, environment handling, stack ordering).
#
# Usage in your .gitlab-ci.yml:
#   include:
#     - remote: 'https://raw.githubusercontent.com/rios0rios0/pipelines/main/gitlab/terra/terra.yaml'
#
#   # Add your project-specific delivery stage:
#   delivery:
#     stage: 'delivery'
#     script:
#       - terra apply environments/my-stack

include:
  - remote: 'https://raw.githubusercontent.com/rios0rios0/pipelines/main/gitlab/global/abstracts/default-image.yaml'
  - remote: 'https://raw.githubusercontent.com/rios0rios0/pipelines/main/gitlab/global/stages/10-code-check/rebase-check.yaml'
  - remote: 'https://raw.githubusercontent.com/rios0rios0/pipelines/main/gitlab/terra/stages/10-code-check/terra.yaml'
  - remote: 'https://raw.githubusercontent.com/rios0rios0/pipelines/main/gitlab/terra/stages/20-security/terra.yaml'
  - remote: 'https://raw.githubusercontent.com/rios0rios0/pipelines/main/gitlab/terra/stages/30-tests/terra.yaml'
  - remote: 'https://raw.githubusercontent.com/rios0rios0/pipelines/main/gitlab/terra/stages/35-management/terra.yaml'

stages:
  - 'code check (style/quality)'
  - 'security (sca/sast)'
  - 'tests'
  - 'management'
