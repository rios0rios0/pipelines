# see the bottom of the file for more information¹
# the parent workflow is responsible for setting up the call events²
on:
  workflow_call:
    inputs:
      tag_prefixes:
        type: 'string'
        required: false
        default: '["", "v"]'
        description: 'JSON array of tag prefixes (e.g., ''["", "v"]''). Use ''[""]'' for no prefix.'
      sonar_host:
        description: 'SonarQube/SonarCloud host URL (leave empty to skip SonarQube)'
        required: false
        type: string
        default: ''
    secrets:
      sonar_token:
        description: 'SonarQube authentication token'
        required: false

jobs:
  go:
    uses: 'rios0rios0/pipelines/.github/workflows/go.yaml@main'
    with:
      cross_compile: true
      sonar_host: ${{ inputs.sonar_host }}
    secrets:
      sonar_token: ${{ secrets.sonar_token }}

  # fourth stage
  delivery-release:
    name: 'delivery > release'
    runs-on: 'ubuntu-latest'
    outputs:
      tag_name: "${{ steps.release.outputs.tag_name }}"
    strategy:
      matrix:
        prefix: ${{ fromJSON(inputs.tag_prefixes) }}
    steps:
      - id: 'release'
        uses: 'rios0rios0/pipelines/github/global/stages/40-delivery/release@main'
        with:
          tag_prefix: "${{ matrix.prefix }}"
    needs: [ 'go' ]
    # Cut on a main-branch bump merge, OR on a version-tag push so a bump whose
    # main run failed the quality gate can be recovered by (re-)pushing its tag
    # (the gate jobs skip on tags; 40-delivery/release derives the version from
    # the tag ref).
    if: "(github.event_name == 'push' && github.ref == 'refs/heads/main' && (contains(github.event.head_commit.message, 'chore/bump-') || contains(github.event.head_commit.message, 'chore(bump)'))) || startsWith(github.ref, 'refs/tags/')"


# 1 - this file MUST be inside ".github/workflows" because of GitHub Actions limitations
# 2 - the recommended events to trigger this workflow and permissions are:
#   on:
#     push:
#       branches:
#         - 'main'
#       tags:
#         - '*'
#     pull_request:
#       branches:
#         - 'main'
#     workflow_dispatch:
#
#   permissions:
#     checks: 'write' # code_check-style_golangci_lint
#     security-events: 'write' # security-sast_codeql
#     contents: 'write' # delivery-release
#
# workflow_dispatch inputs can only be defined in the workflow that is directly triggered
#
# This workflow will create releases with both no prefix and 'v' prefix (e.g., "1.0.0" and "v1.0.0")
# when a version-bump commit is pushed to main.
