include:
  - remote: 'https://raw.githubusercontent.com/rios0rios0/pipelines/main/gitlab/terra/abstracts/terra.yaml'

# Single unified job that orchestrates both tiers of Terraform testing
# behind one `test:all` entry: native `terraform test` over
# `modules/*/tests/*.tftest.hcl` (tier 1) followed by the Go Terratest
# suite under `tests/terratest/` (tier 2). The runner auto-detects which
# tiers the consumer has, runs only those, and exits 0 when neither is
# present — so stack-only repos (no `modules/` tests, no `tests/terratest/`)
# pass the stage without a bespoke opt-out.
test:all:
  extends: '.terra'
  stage: 'tests'
  variables:
    REPORT_PATH: 'build/reports'
  script:
    - "$SCRIPTS_DIR/global/scripts/languages/terraform/test-all/run.sh"
  artifacts:
    when: 'always'
    paths:
      - "${REPORT_PATH}/"
    reports:
      junit: "${REPORT_PATH}/junit-terra-all.xml"
      # GitLab renders a coverage percentage from the Cobertura file when
      # the terra-test tier ran; missing-file is not an error for GitLab.
      coverage_report:
        coverage_format: 'cobertura'
        path: "${REPORT_PATH}/terra-coverage.xml"

# Third tier — repo-convention assertions the consumer owns. Runs
# `tests/structural.sh` if it exists and publishes the resulting JUnit.
# The script is deliberately not shipped here; every repo has its own
# conventions (customer dir naming, bootstrap self-containedness, shared
# root.hcl presence) that can't live upstream. Skipped silently when the
# consumer has no structural script.
test:structural:
  extends: '.terra'
  stage: 'tests'
  variables:
    REPORT_PATH: 'build/reports'
  script:
    - "$SCRIPTS_DIR/global/scripts/languages/terraform/structural/run.sh"
  artifacts:
    when: 'always'
    paths:
      - "${REPORT_PATH}/"
    reports:
      junit: "${REPORT_PATH}/junit-structural.xml"
