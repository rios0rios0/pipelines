include:
  - remote: 'https://raw.githubusercontent.com/rios0rios0/pipelines/main/gitlab/javascript/abstracts/yarn.yaml'

style:eslint:
  extends: '.yarn'
  stage: 'code check (style/quality)'
  before_script:
  script:
    - !reference [ .style:eslint, before_script ]
    - yarn lint:ci
    # ESLint, knip, and test runners all transpile without type checking, so
    # `tsc` is the only tool that fails on type errors before a merge.
    - |
      if node -e "process.exit((require('./package.json').scripts || {}).typecheck ? 0 : 1)" 2>/dev/null; then
        yarn typecheck
      elif [ -f tsconfig.json ]; then
        yarn tsc --noEmit
      else
        echo 'No "typecheck" script or tsconfig.json found; skipping the type check.'
      fi
    - !reference [ .style:eslint, after_script ]
  cache:
    paths: !reference [ .style:eslint, cache, paths ]

quality:knip:
  extends: '.yarn'
  stage: 'code check (style/quality)'
  before_script:
  script:
    - !reference [ .style:eslint, before_script ]
    - npx --yes knip
    - !reference [ .style:eslint, after_script ]
  cache:
    paths: !reference [ .style:eslint, cache, paths ]
  allow_failure: true
