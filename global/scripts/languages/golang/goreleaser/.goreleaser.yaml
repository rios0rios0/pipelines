version: 2
project_name: '__BINARY_NAME__'
builds:
  - main: '__BINARY_PATH__'
    binary: '__BINARY_NAME__'
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    goos:
      - linux
      - darwin
      - windows
      - android
    goarch:
      - amd64
      - arm64
    overrides:
      - goos: 'android'
        goarch: 'arm64'
        env:
          - CGO_ENABLED=1
          - CC={{ .Env.ANDROID_NDK_CC_ARM64 }}
          - CXX={{ .Env.ANDROID_NDK_CXX_ARM64 }}
      - goos: 'android'
        goarch: 'amd64'
        env:
          - CGO_ENABLED=1
          - CC={{ .Env.ANDROID_NDK_CC_AMD64 }}
          - CXX={{ .Env.ANDROID_NDK_CXX_AMD64 }}
archives:
  - formats: ['tar.gz']
    name_template: '{{ .ProjectName }}-{{ .Version }}-{{ .Os }}-{{ .Arch }}'
    format_overrides:
      - goos: windows
        formats: ['zip']
checksum:
  name_template: 'checksums.txt'
release:
  mode: keep-existing
changelog:
  disable: true
