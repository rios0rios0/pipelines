include:
  - remote: 'https://raw.githubusercontent.com/rios0rios0/pipelines/main/gitlab/global/abstracts/scripts-repo.yaml'

# Installs the terra CLI (https://github.com/rios0rios0/terra) which wraps
# Terraform and Terragrunt. `install.sh` only installs terra when the binary is
# absent — with no `--force` it prints "already installed" and exits 0 without
# comparing versions, so on a persistent self-hosted runner (where the binary
# survives between jobs) the pipeline keeps whatever version was first installed
# and never picks up new releases. `terra self-update --force` then refreshes the
# CLI to the latest release non-interactively, before `terra install` pulls the
# matching Terraform and Terragrunt versions.
.terra:
  extends: '.scripts-repo'
  # Go 1.24 is a lower bound — `GOTOOLCHAIN=auto` (the Go 1.21+ default)
  # auto-fetches a newer toolchain when the consumer's `go.mod` under
  # `tests/terratest/` requires one (Terratest suites frequently pin
  # `go 1.26`+). Bumping from 1.23 unblocks consumers whose terratest
  # `go.mod` declares a Go version the base image can't satisfy.
  image: 'golang:1.24'
  before_script:
    - !reference [.scripts-repo, before_script]
    - curl -fsSL https://raw.githubusercontent.com/rios0rios0/terra/main/install.sh | sh
    - terra self-update --force
    - terra install
  cache:
    key: "${CI_COMMIT_REF_SLUG}"
    paths:
      - '.terraform'
      - '.terraform.lock.hcl'
