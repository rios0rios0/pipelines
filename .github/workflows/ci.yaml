name: 'CI - Pipeline Templates Validation'

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: 'Validate Templates and Scripts'
    runs-on: 'ubuntu-latest'

    steps:
      - name: 'Checkout code'
        uses: 'actions/checkout@v6'

      - name: 'Setup Go 1.25'
        uses: 'actions/setup-go@v6'
        with:
          go-version: '1.25'
          cache-dependency-path: 'go.sum'

      - name: 'Install dependencies'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-yaml make

      - name: 'Check required files'
        run: |
          echo "Checking required files..."
          for f in CONTRIBUTING.md CHANGELOG.md README.md Makefile clone.sh; do
            test -f "$f" && echo "  ✓ $f" || { echo "  ✗ $f is missing"; exit 1; }
          done
          for f in .github/tests/test-go-validation.sh .github/tests/test-lambda-templates.sh; do
            test -f "$f" && echo "  ✓ $f" || { echo "  ✗ $f is missing"; exit 1; }
          done

      - name: 'Validate YAML syntax'
        run: |
          echo "Validating YAML files across all providers..."
          errors=0
          for template in $(find github gitlab azure-devops global .github/workflows .docs/examples -name '*.yaml' -o -name '*.yml' 2>/dev/null); do
            if python3 -c "
          import yaml
          # Handle custom YAML tags used by GitLab CI (e.g., !reference)
          class CustomSafeLoader(yaml.SafeLoader):
              pass
          def default_constructor(loader, tag_suffix, node):
              if isinstance(node, yaml.ScalarNode):
                  return loader.construct_scalar(node)
              elif isinstance(node, yaml.SequenceNode):
                  return loader.construct_sequence(node)
              elif isinstance(node, yaml.MappingNode):
                  return loader.construct_mapping(node)
          CustomSafeLoader.add_multi_constructor('!', default_constructor)
          yaml.load(open('$template'), Loader=CustomSafeLoader)
          " 2>/dev/null; then
              echo "  ✓ $template"
            else
              echo "  ✗ $template -- invalid YAML"
              errors=$((errors + 1))
            fi
          done
          if [ "$errors" -gt 0 ]; then
            echo "Found $errors YAML validation error(s)"
            exit 1
          fi

      - name: 'Validate script permissions'
        run: |
          echo "Checking script permissions..."
          errors=0
          for script in $(find global/scripts -name "run.sh" -type f); do
            if [ ! -x "$script" ]; then
              echo "  ✗ $script is not executable"
              errors=$((errors + 1))
            else
              echo "  ✓ $script"
            fi
          done
          if [ "$errors" -gt 0 ]; then
            echo "Found $errors permission error(s) -- run: chmod +x <script>"
            exit 1
          fi

      - name: 'Run all validation tests'
        run: make test

  lint-scripts:
    name: 'Lint Shell Scripts'
    runs-on: 'ubuntu-latest'

    steps:
      - name: 'Checkout code'
        uses: 'actions/checkout@v6'

      - name: 'Install ShellCheck'
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: 'Run ShellCheck'
        run: |
          echo "Running ShellCheck on all shell scripts..."
          errors=0
          for script in $(find global/scripts -name "*.sh" -type f); do
            echo "Checking $script..."
            if shellcheck --severity=warning "$script"; then
              echo "  ✓ $script"
            else
              echo "  ✗ $script has issues"
              errors=$((errors + 1))
            fi
          done
          if [ "$errors" -gt 0 ]; then
            echo "ShellCheck found issues in $errors script(s)"
            exit 1
          fi
