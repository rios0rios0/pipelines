include:
  - remote: 'https://raw.githubusercontent.com/rios0rios0/pipelines/main/gitlab/global/abstracts/docker-login-push.yaml'

delivery:qa:
  extends: '.docker-login-push'
  stage: 'delivery'
  variables:
    TAG: 'latest'
  # TODO: this 'cache' section should be optional
  cache: !reference [ .delivery, cache ]
  script:
    - !reference [ .delivery, script ]
  rules:
    - if: "$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH"

delivery:prod:
  stage: 'delivery'
  image: 'alpine:latest'
  variables:
    REGISTRY_PATH: "$CI_REGISTRY_IMAGE"
    IMAGE_SUFFIX: ''
  before_script:
    - apk add --no-cache curl
    - curl -sL "https://github.com/google/go-containerregistry/releases/latest/download/go-containerregistry_Linux_x86_64.tar.gz" | tar xz crane
    - ./crane auth login "$CI_REGISTRY" -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD"
  script:
    - ./crane copy "$REGISTRY_PATH$IMAGE_SUFFIX:latest" "$REGISTRY_PATH$IMAGE_SUFFIX:$CI_COMMIT_TAG"
  rules:
    - if: "$CI_COMMIT_TAG"
