# see the bottom of the file for more information¹
# the parent workflow is responsible for setting up the call events²
on:
  workflow_call:
    inputs:
      sonar_host:
        description: 'SonarQube/SonarCloud host URL (leave empty to skip SonarQube)'
        required: false
        type: string
        default: ''
    secrets:
      NVD_API_KEY:
        required: false
      sonar_token:
        description: 'SonarQube authentication token'
        required: false

jobs:
  # first stage
  code_check-basic_checks:
    name: 'code-check > quality:basic-checks'
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'rios0rios0/pipelines/github/global/stages/10-code-check/basic-checks@main'
        with:
          target_branch: ${{ github.event.pull_request.base.ref || github.event.repository.default_branch || 'main' }}
    if: "github.event_name == 'pull_request'"

  code_check-style_checkstyle:
    name: 'code-check > style:checkstyle'
    runs-on: 'ubuntu-latest'
    steps:
      - name: 'Checkout code'
        uses: 'actions/checkout@v6'

      - name: 'Setup Java'
        uses: 'actions/setup-java@v5'
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - run: ./gradlew check -x test
        shell: 'bash'
    continue-on-error: true
    if: "!startsWith(github.ref, 'refs/tags/')"


  # second stage
  security-sast_codeql:
    name: 'security > sast:codeql'
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'rios0rios0/pipelines/github/global/stages/20-security/codeql@main'
        with:
          codeql_language: 'java-kotlin'
    needs: [ 'code_check-style_checkstyle' ]
    if: "!startsWith(github.ref, 'refs/tags/')"

  security-sast_semgrep:
    name: 'security > sast:semgrep'
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'rios0rios0/pipelines/github/global/stages/20-security/docker-semgrep@main'
        with:
          semgrep_lang: 'java'
    needs: [ 'code_check-style_checkstyle' ]
    if: "!startsWith(github.ref, 'refs/tags/')"

  security-sast_gitleaks:
    name: 'security > sast:gitleaks'
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'rios0rios0/pipelines/github/global/stages/20-security/docker-gitleaks@main'
    needs: [ 'code_check-style_checkstyle' ]
    if: "!startsWith(github.ref, 'refs/tags/')"

  security-sast_hadolint:
    name: 'security > sast:hadolint'
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'rios0rios0/pipelines/github/global/stages/20-security/hadolint@main'
    needs: [ 'code_check-style_checkstyle' ]
    continue-on-error: true
    if: "!startsWith(github.ref, 'refs/tags/')"

  security-sast_trivy:
    name: 'security > sast:trivy'
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'rios0rios0/pipelines/github/global/stages/20-security/trivy@main'
    needs: [ 'code_check-style_checkstyle' ]
    continue-on-error: true
    if: "!startsWith(github.ref, 'refs/tags/')"

  security-sca_trivy:
    name: 'security > sca:trivy'
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'rios0rios0/pipelines/github/global/stages/20-security/trivy-sca@main'
    needs: [ 'code_check-style_checkstyle' ]
    continue-on-error: true
    if: "!startsWith(github.ref, 'refs/tags/')"

  security-sca_dependency_check:
    name: 'security > sca:dependency-check'
    runs-on: 'ubuntu-latest'
    steps:
      - name: 'Checkout code'
        uses: 'actions/checkout@v6'

      - name: 'Setup Java'
        uses: 'actions/setup-java@v5'
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: 'Get current week number'
        id: 'week'
        run: echo "week=$(date +%Y-%W)" >> "$GITHUB_OUTPUT"
        shell: 'bash'

      - name: 'Cache NVD database'
        uses: 'actions/cache@v4'
        with:
          path: '.owasp'
          key: owasp-nvd-${{ runner.os }}-${{ steps.week.outputs.week }}
          restore-keys: |
            owasp-nvd-${{ runner.os }}-

      - name: 'Run OWASP Dependency-Check'
        run: |
          mkdir -p '.owasp'
          export OWASP_PATH="$(pwd)/.owasp"
          ./gradlew dependencyCheckAnalyze
        shell: 'bash'
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
    needs: [ 'code_check-style_checkstyle' ]
    continue-on-error: true
    if: "!startsWith(github.ref, 'refs/tags/')"

  security-sast_proguard:
    name: 'security > sast:proguard'
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'rios0rios0/pipelines/github/java/stages/20-security/proguard@main'
    needs: [ 'code_check-style_checkstyle' ]
    continue-on-error: true
    if: "!startsWith(github.ref, 'refs/tags/')"


  # third stage
  tests-test_all:
    name: 'tests > test:all'
    runs-on: 'ubuntu-latest'
    steps:
      - name: 'Checkout code'
        uses: 'actions/checkout@v6'

      - name: 'Setup Java'
        uses: 'actions/setup-java@v5'
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - run: ./gradlew test
        shell: 'bash'

      - name: 'Test Results'
        if: "always() && hashFiles('build/test-results/test/*.xml') != ''"
        uses: 'dorny/test-reporter@v1'
        with:
          name: 'Test Results'
          path: 'build/test-results/test/*.xml'
          reporter: 'java-junit'

      - name: 'Upload Coverage Report'
        if: "always() && hashFiles('build/reports/jacoco/test/jacocoTestReport.xml') != ''"
        uses: 'actions/upload-artifact@v4'
        with:
          name: 'coverage-report'
          path: 'build/reports/jacoco/'
          retention-days: 30
    needs: [ 'security-sast_codeql', 'security-sast_semgrep', 'security-sast_gitleaks', 'security-sast_hadolint', 'security-sast_trivy', 'security-sca_trivy', 'security-sca_dependency_check', 'security-sast_proguard' ]
    if: "!startsWith(github.ref, 'refs/tags/')"


  # management stage (optional)
  management-report_sonarqube:
    name: 'management > report:sonarqube'
    runs-on: 'ubuntu-latest'
    container:
      image: 'sonarsource/sonar-scanner-cli:6.2.1'
    needs: ['tests-test_all']
    if: "inputs.sonar_host != '' && !startsWith(github.ref, 'refs/tags/')"
    continue-on-error: true
    steps:
      - name: 'Checkout code'
        uses: 'actions/checkout@v6'
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: 'Download coverage artifact'
        uses: 'actions/download-artifact@v4'
        with:
          name: 'coverage-report'
          path: 'build/reports/jacoco/'
        continue-on-error: true

      - name: 'Checkout scripts'
        uses: 'rios0rios0/pipelines/github/global/abstracts/scripts-repo@main'

      - name: 'Run SonarQube'
        run: '${{ env.SCRIPTS_DIR }}/global/scripts/tools/sonarqube/run.sh'
        shell: 'bash'
        env:
          SONAR_HOST_URL: ${{ inputs.sonar_host }}
          SONAR_TOKEN: ${{ secrets.sonar_token }}


# 1 - this file MUST be inside ".github/workflows" because of GitHub Actions limitations
# 2 - the recommended events to trigger this workflow and permissions are:
