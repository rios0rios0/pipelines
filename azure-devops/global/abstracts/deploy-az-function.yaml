parameters:
  - name: PIPELINE_FIREWALL_NAME
    type: 'string'
  - name: RESOURCE_GROUP_NAME
    type: 'string'
  - name: ENVIRONMENT
    type: 'string'
  - name: AZM_SERVICE_CONNECTION
    type: 'string'
  - name: AZURE_DEPLOY_OUTPUTS
    type: 'object'
  - name: MIGRATIONS_CACHE
    type: 'string'
  - name: SEEDERS_CACHE
    type: 'string'

steps:
  - script: |
      set -e
      echo "Environment Variable: $RESOURCE_GROUP_NAME"
    displayName: 'Print resourceGroupName'
    env:
      RESOURCE_GROUP_NAME: ${{ parameters.RESOURCE_GROUP_NAME }}

  - template: './database.yaml'
    parameters:
      PIPELINE_FIREWALL_NAME: ${{ parameters.PIPELINE_FIREWALL_NAME }}
      RESOURCE_GROUP_NAME: ${{ parameters.RESOURCE_GROUP_NAME }}
      ENVIRONMENT: ${{ parameters.ENVIRONMENT }}
      AZM_SERVICE_CONNECTION: ${{ parameters.AZM_SERVICE_CONNECTION }}
      OUTPUTS: ${{ parameters.AZURE_DEPLOY_OUTPUTS }}
      MIGRATIONS_CACHE: ${{ parameters.MIGRATIONS_CACHE }}
      SEEDERS_CACHE: ${{ parameters.SEEDERS_CACHE }}

  - script: |
      set -e
      siteName=$(echo '${{ parameters.AZURE_DEPLOY_OUTPUTS }}' | jq -r '.siteName.value')
      echo "##vso[task.setvariable variable=siteName]$siteName"
    displayName: 'Getting Pipeline Variables'

