inputs:
  binary_name:
    type: 'string'
    required: true
    description: 'Binary name to be used as default source'
  binary_path:
    type: 'string'
    required: false
    default: '.'
    description: 'Path to the main package (e.g. ./cmd/terra). Defaults to auto-detection.'
  tag_name:
    type: 'string'
    required: true
    description: 'Tag name to use for the release'

runs:
  using: 'composite'
  steps:
    - name: 'Checkout code'
      uses: 'actions/checkout@v6'
      with:
        fetch-depth: 0

    - name: 'Fetch tags'
      run: git fetch --force --tags
      shell: 'bash'

    - name: 'Setup Go'
      uses: 'actions/setup-go@v6'
      with:
        go-version-file: 'go.mod'
        cache-dependency-path: 'go.sum'

    - name: 'Setup Zig'
      uses: 'mlugg/setup-zig@v1'

    - uses: 'rios0rios0/pipelines/github/global/abstracts/scripts-repo@main'

    - name: 'Prepare GoReleaser config'
      run: |
        "$SCRIPTS_DIR/global/scripts/languages/golang/goreleaser/prepare.sh" \
          "${{ inputs.binary_name }}" \
          "${{ inputs.binary_path }}"
      shell: 'bash'

    - name: 'Run GoReleaser'
      uses: 'goreleaser/goreleaser-action@v6'
      with:
        distribution: 'goreleaser'
        version: '~> v2'
        args: 'release --clean'
      env:
        GITHUB_TOKEN: ${{ github.token }}
        GORELEASER_CURRENT_TAG: ${{ inputs.tag_name }}
