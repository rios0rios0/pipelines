stages:
  - stage: 'e2e'
    displayName: 'e2e (apply-time)'
    # Opt-in tier. Drives the real providers against a disposable `kind`
    # cluster provisioned below. Purpose: catch regressions a mocked plan
    # can't — admission-time validations, provider authentication drift,
    # CRDs missing from the mock catalogue, Helm render failures with real
    # values. Skip on tag builds (the tag carries the green state from
    # the merge on main).
    #
    # The stage runs two complementary tiers sharing one cluster:
    #
    #   Tier 1 -- `tests/e2e/*.tftest.hcl` via `terraform test`
    #     Native framework, same language as `smoke.tftest.hcl`, no Go
    #     toolchain needed. Assertions limited to `output` values and
    #     `expect_failures`. Good for "apply must succeed, module must
    #     expose output X".
    #
    #   Tier 2 -- `tests/terratest/*.go` via `terratest/run.sh`
    #     Go + terratest library, can call `client-go`, `helm-sdk`,
    #     etc. Assertions are arbitrary code. Good for "pod is Running,
    #     service has endpoints, secret has expected base64 shape".
    #
    # A module opts into whichever tier(s) make sense. Modules with
    # neither directory no-op the whole stage (there are 9+ azm-* /
    # clf-* repos that can't apply against kind at all).
    condition: and(succeeded(), not(startsWith(variables['Build.SourceBranch'], 'refs/tags/')))
    variables:
      REPORT_PATH: 'build/reports'
      # Kind cluster name scoped per build so concurrent pipeline runs
      # on the same agent pool don't collide. `Build.BuildId` is unique
      # per run across the project.
      KIND_CLUSTER_NAME: 'tfmod-e2e-$(Build.BuildId)'
    jobs:
      - job: 'test_e2e'
        displayName: 'test:e2e'
        steps:
          - template: '../../../global/abstracts/scripts-repo.yaml'
          - template: '../../abstracts/terra-terraform.yaml'

          - script: |
              set -eu
              HAS_TFTEST=false
              HAS_TERRATEST=false
              if [ -d tests/e2e ] && ls tests/e2e/*.tftest.hcl >/dev/null 2>&1; then
                HAS_TFTEST=true
              fi
              if [ -d tests/terratest ] && ls tests/terratest/*.go >/dev/null 2>&1; then
                HAS_TERRATEST=true
              fi
              echo "##vso[task.setvariable variable=HAS_TFTEST]$HAS_TFTEST"
              echo "##vso[task.setvariable variable=HAS_TERRATEST]$HAS_TERRATEST"
              if [ "$HAS_TFTEST" = "false" ] && [ "$HAS_TERRATEST" = "false" ]; then
                echo "Neither tests/e2e/*.tftest.hcl nor tests/terratest/*.go present; skipping stage."
                echo "##vso[task.setvariable variable=SKIP_E2E]true"
              else
                echo "Detected tiers: tftest=$HAS_TFTEST, terratest=$HAS_TERRATEST"
              fi
            displayName: 'Detect e2e opt-ins'

          # Kind is a single Go binary. Install by curl to avoid the
          # overhead of a dedicated install task. Matching the same
          # pattern already used for tflint in `10-code-check`.
          - script: |
              set -eu
              if [ "${SKIP_E2E:-}" = "true" ]; then exit 0; fi
              curl -fsSL -o /tmp/kind \
                https://kind.sigs.k8s.io/dl/v0.24.0/kind-linux-amd64
              chmod +x /tmp/kind
              sudo mv /tmp/kind /usr/local/bin/kind
              kind version
            displayName: 'Install kind'
            condition: and(succeeded(), ne(variables['SKIP_E2E'], 'true'))

          - script: |
              set -eu
              if [ "${SKIP_E2E:-}" = "true" ]; then exit 0; fi
              kind create cluster --name "$(KIND_CLUSTER_NAME)" --wait 120s
              kind get kubeconfig --name "$(KIND_CLUSTER_NAME)" > "$(Agent.TempDirectory)/kubeconfig"
              # `KUBECONFIG` is what kubectl, client-go, and terratest read.
              # `KUBE_CONFIG_PATH` is what the Terraform `kubernetes` /
              # `helm` providers read — they do NOT fall back to
              # `KUBECONFIG` automatically, and without this env var an
              # apply-time test fails with
              # `Post "http://localhost/api/v1/...": connection refused`.
              # Verified locally against a kind cluster before shipping.
              echo "##vso[task.setvariable variable=KUBECONFIG]$(Agent.TempDirectory)/kubeconfig"
              echo "##vso[task.setvariable variable=KUBE_CONFIG_PATH]$(Agent.TempDirectory)/kubeconfig"
              kubectl --kubeconfig "$(Agent.TempDirectory)/kubeconfig" get nodes
            displayName: 'Provision kind cluster'
            condition: and(succeeded(), ne(variables['SKIP_E2E'], 'true'))

          # Go toolchain only when the terratest tier is opted in — saves
          # ~20s per build on modules that stop at the tftest-hcl tier.
          # `GOTOOLCHAIN=auto` (Go 1.21+ default) will transparently fetch
          # a newer toolchain when the consumer's `go.mod` requires it,
          # so this pin is a lower bound, not a hard version.
          - task: 'GoTool@0'
            displayName: 'Use Go (for terratest tier)'
            condition: and(succeeded(), eq(variables['HAS_TERRATEST'], 'true'))
            inputs:
              version: '1.26'

          # Tier 1: native `terraform test` with real providers. Drives
          # `tests/e2e/*.tftest.hcl`. Auto-destroys at end-of-file so a
          # red test still cleans up; `kind delete cluster` below is the
          # backstop.
          - script: |
              set -eu
              mkdir -p "$(REPORT_PATH)"
              terraform init -backend=false -input=false -upgrade=false >/dev/null
              terraform test -test-directory=tests/e2e \
                -junit-xml="$(REPORT_PATH)/junit-e2e-tftest.xml"
            displayName: 'Tier 1: apply-time via terraform test'
            condition: and(succeeded(), eq(variables['HAS_TFTEST'], 'true'))

          # Tier 2: terratest via the shared Go runner. The runner writes
          # `junit-terratest.xml`; rename to `junit-e2e-terratest.xml` so
          # it doesn't collide with the separate `terratest` runner
          # invocation used by the `30-test` stage (which reads
          # `tests/terratest/` for non-cluster-bound checks on some
          # consumers — none on terraform-modules today, but reserving
          # the namespace).
          - script: |
              set -eu
              TESTS_DIR=tests/terratest REPORT_PATH="$(REPORT_PATH)" \
                "$(Scripts.Directory)/global/scripts/languages/terraform/terratest/run.sh"
              if [ -f "$(REPORT_PATH)/junit-terratest.xml" ]; then
                mv "$(REPORT_PATH)/junit-terratest.xml" \
                   "$(REPORT_PATH)/junit-e2e-terratest.xml"
              fi
            displayName: 'Tier 2: apply-time via terratest'
            condition: and(succeeded(), eq(variables['HAS_TERRATEST'], 'true'))

          # Tear the cluster down regardless of test outcome. Without
          # `condition: always()` a red test would leak the cluster until
          # the agent's next cleanup pass.
          - script: |
              set -eu
              if [ "${SKIP_E2E:-}" = "true" ]; then exit 0; fi
              kind delete cluster --name "$(KIND_CLUSTER_NAME)" || true
            displayName: 'Tear down kind cluster'
            condition: always()

          - task: 'PublishTestResults@2'
            displayName: 'Publish tftest-hcl e2e results'
            condition: and(always(), eq(variables['HAS_TFTEST'], 'true'))
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: '$(REPORT_PATH)/junit-e2e-tftest.xml'
              testRunTitle: 'terraform-e2e-tftest'
              failTaskOnFailedTests: true
              mergeTestResults: false

          - task: 'PublishTestResults@2'
            displayName: 'Publish terratest e2e results'
            condition: and(always(), eq(variables['HAS_TERRATEST'], 'true'))
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: '$(REPORT_PATH)/junit-e2e-terratest.xml'
              testRunTitle: 'terraform-e2e-terratest'
              failTaskOnFailedTests: true
              mergeTestResults: false

          - task: 'PublishPipelineArtifact@1'
            displayName: 'Publish e2e reports'
            condition: and(always(), ne(variables['SKIP_E2E'], 'true'))
            inputs:
              targetPath: '$(REPORT_PATH)'
              artifactName: 'terraform-e2e-reports'
              publishLocation: 'pipeline'
