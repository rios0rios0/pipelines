parameters:
  - name: 'PIPELINE_FIREWALL_NAME'
    type: 'string'
  - name: 'RESOURCE_GROUP_NAME'
    type: 'string'
  - name: ENVIRONMENT
    type: 'string'
  - name: AZM_SERVICE_CONNECTION
    type: 'string'

steps:
  - task: 'AzureCLI@2'
    inputs:
      azureSubscription: "$(AZM_SERVICE_CONNECTION)"
      scriptType: 'bash'
      scriptLocation: 'inlineScript'
      inlineScript: |
        set -e

        # Exibe o valor da variável AZURE_DEPLOY_OUTPUTS
        echo "Deployment Outputs:"
        echo $AZURE_DEPLOY_OUTPUTS

        echo "Deployment Deploy Cache:"
        echo $(AZURE_DEPLOY_CACHE)

        echo "RESOURCE_GROUP_NAME VALUE:"
        echo ${RESOURCE_GROUP_NAME}
        echo "VARIABLE RESOURCE_GROUP_NAME VALUE:"
        echo $(resourceGroupName)

        mkdir -p $(AZURE_DEPLOY_CACHE)

        echo $AZURE_DEPLOY_OUTPUTS > $(AZURE_DEPLOY_CACHE)/outputs.json

        # Verifica se o arquivo foi criado
        if [ -f "$(AZURE_DEPLOY_CACHE)/outputs.json" ]; then
          echo "Arquivo outputs.json criado com sucesso."
          
          # Exibe o conteúdo do arquivo
          echo "Conteúdo do outputs.json:"
          cat $(AZURE_DEPLOY_CACHE)/outputs.json
        else
          echo "Erro: Arquivo outputs.json não foi encontrado."
          exit 1
        fi        
    displayName: 'Save Deployment Outputs to File'
    # condition: and(succeeded(), eq(variables['AZURE_DEPLOY_CACHE_HIT'], 'false'))

  - task: 'AzureCLI@2'
    inputs:
      azureSubscription: "$(AZM_SERVICE_CONNECTION)"
      scriptType: 'bash'
      scriptLocation: 'inlineScript'
      inlineScript: |
        set -e
        filePath="$(AZURE_DEPLOY_CACHE)/outputs.json"

        # Verifica se o arquivo existe
          if [ -f "$filePath" ]; then
        echo "File outputs.json found at $filePath"
        else
          echo "Error: File outputs.json not found at $filePath"
          exit 1
        fi

        # Lê o conteúdo do arquivo e imprime no log
        outputs=$(cat "$filePath")
        echo "Contents of outputs.json:"
        echo "$outputs"

        outputs=$(cat $(AZURE_DEPLOY_CACHE)/outputs.json)
        echo "##vso[task.setvariable variable=OUTPUTS]$outputs"
    displayName: 'Read Outputs from file'

  - template: './database.yaml'
    parameters:
      PIPELINE_FIREWALL_NAME: $(PIPELINE_FIREWALL_NAME)
      RESOURCE_GROUP_NAME: $(resourceGroupName)
      ENVIRONMENT: $(ENVIRONMENT)
      AZM_SERVICE_CONNECTION: $(AZM_SERVICE_CONNECTION)

  - script: |
      echo "RESOURCE_GROUP_NAME VALUE:"
      echo ${RESOURCE_GROUP_NAME}

      siteName=$(echo $OUTPUTS | jq -r '.siteName.value')
      echo "##vso[task.setvariable variable=siteName]$siteName"
    displayName: 'Getting Pipeline Variables'
  - task: 'AzureCLI@2'
    inputs:
      azureSubscription: "$(AZM_SERVICE_CONNECTION)"
      scriptType: 'bash'
      scriptLocation: 'inlineScript'
      inlineScript: |
        set -e

        echo "CONTENT RESOURCE GROUP NAME:"
        echo "${RESOURCE_GROUP_NAME}"

        echo "VARIABLE RESOURCE_GROUP_NAME VALUE:"
        echo $(resourceGroupName)

        SETTINGS=""
        for var in $(compgen -e); do
          if [[ $var == REPLACE_* ]]; then
            if [[ -z ${!var} ]]; then
              echo "Warning: $var isn't defined"
            else
              setting_name=${var#REPLACE_}
              SETTINGS+="$setting_name=${!var} "
            fi
          fi
        done
        if [[ -z $SETTINGS ]]; then
          echo "Warning: There are no environment variables to update"
        else
          az functionapp config appsettings set \
            --name "$(siteName)" \
            --resource-group "$(resourceGroupName)" \
            --settings $SETTINGS
        fi
    displayName: 'Replace Azure Function Variables'

  - task: 'AzureCLI@2'
    displayName: 'Publish Function'
    inputs:
      azureSubscription: "$(AZM_SERVICE_CONNECTION)"
      scriptType: 'bash'
      scriptLocation: 'inlineScript'
      inlineScript: |
        set -e
        az functionapp deployment source config-zip \
          --name "$(siteName)" \
          --resource-group "$(resourceGroupName)" \
          --src "$(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip"
    retryCountOnTaskFailure: 3
