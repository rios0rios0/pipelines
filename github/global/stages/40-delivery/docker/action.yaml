inputs:
  github_token:
    description: 'GitHub token for GHCR authentication (defaults to automatic GITHUB_TOKEN)'
    type: 'string'
    required: false
    default: ''
  tag_name:
    description: 'Release version (e.g., 1.2.3). When provided, computes semver Docker tags directly instead of using docker/metadata-action.'
    type: 'string'
    required: false
    default: ''
  tags:
    description: 'Docker image tags (computed automatically via docker/metadata-action if not provided)'
    type: 'string'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: 'Checkout code'
      uses: 'actions/checkout@v6'

    - name: 'Compute tags from release version'
      id: 'release-tags'
      shell: 'bash'
      run: |
        VERSION="${{ inputs.tag_name }}"
        IMAGE="ghcr.io/${{ github.repository }}"
        MAJOR_MINOR="${VERSION%.*}"
        {
          echo 'tags<<EOF'
          echo "${IMAGE}:latest"
          echo "${IMAGE}:${VERSION}"
          echo "${IMAGE}:${MAJOR_MINOR}"
          echo 'EOF'
        } >> "$GITHUB_OUTPUT"
      if: "inputs.tags == '' && inputs.tag_name != ''"

    - name: 'Extract Docker metadata'
      id: 'meta'
      uses: 'docker/metadata-action@v5'
      with:
        images: 'ghcr.io/${{ github.repository }}'
        tags: |
          type=raw,value=latest,enable={{is_default_branch}}
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
      if: "inputs.tags == '' && inputs.tag_name == ''"

    - name: 'Login to Registry'
      uses: 'docker/login-action@v3'
      with:
        registry: 'ghcr.io'
        username: '${{ github.actor }}'
        password: '${{ inputs.github_token || github.token }}'

    - name: 'Build and Push'
      uses: 'docker/build-push-action@v6'
      with:
        file: '.ci/stages/40-delivery/app.Dockerfile'
        context: '.'
        push: true
        tags: '${{ inputs.tags || steps.release-tags.outputs.tags || steps.meta.outputs.tags }}'
