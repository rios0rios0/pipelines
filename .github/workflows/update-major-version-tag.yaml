name: 'Update Major Version Tag'

on:
  release:
    types:
      - 'published'
  workflow_call:
    inputs:
      tag_name:
        required: true
        type: 'string'
        description: 'The SemVer tag name (e.g., "4.2.0" or "v4.2.0")'
  workflow_dispatch:
    inputs:
      tag_name:
        required: true
        type: 'string'
        description: 'The SemVer tag name (e.g., "4.2.0" or "v4.2.0")'

permissions:
  contents: write

jobs:
  update-tag:
    name: 'update major version tag'
    runs-on: 'ubuntu-latest'
    if: >-
      (github.event_name != 'release' && inputs.tag_name != '') ||
      (github.event_name == 'release' &&
      !github.event.release.prerelease &&
      contains(github.event.release.tag_name, '.'))
    steps:
      - uses: 'actions/checkout@v4'

      - name: 'Extract major version'
        id: 'extract'
        run: |
          RAW_TAG="${GITHUB_EVENT_RELEASE_TAG_NAME}"
          # Require SemVer format X.Y.Z with an optional leading "v"
          if ! echo "${RAW_TAG}" | grep -Eq '^v?[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Error: Release tag '${RAW_TAG}' is not a valid SemVer tag (expected X.Y.Z or vX.Y.Z)" >&2
            exit 1
          fi
          # Strip optional leading "v" before extracting the major component
          TAG="${RAW_TAG#v}"
          MAJOR="${TAG%%.*}"
          echo "major=v${MAJOR}" >> "${GITHUB_OUTPUT}"
          echo "semver=${RAW_TAG}" >> "${GITHUB_OUTPUT}"
        env:
          GITHUB_EVENT_RELEASE_TAG_NAME: ${{ inputs.tag_name || github.event.release.tag_name }}

      - name: 'Force-update major version tag'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git tag -fa "${{ steps.extract.outputs.major }}" \
            -m "Update ${{ steps.extract.outputs.major }} to ${{ steps.extract.outputs.semver }}"
          git push origin "${{ steps.extract.outputs.major }}" --force

      - name: 'Recreate major version GitHub Release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          MAJOR='${{ steps.extract.outputs.major }}'
          SEMVER='${{ steps.extract.outputs.semver }}'
          REPO='${{ github.repository }}'
          if gh release view "${MAJOR}" --repo "${REPO}" >/dev/null 2>&1; then
            echo "Deleting existing release ${MAJOR} so it can be recreated with a fresh publishedAt and body."
            gh release delete "${MAJOR}" --yes --repo "${REPO}"
          else
            echo "No existing release for ${MAJOR}; nothing to delete."
          fi
          # `gh release create --latest=false` is not enough on its own: GitHub's
          # "Latest" badge is resolved dynamically from the newest non-draft,
          # non-prerelease release by created_at, and `make_latest=false` on a
          # brand-new release does not actually prevent this. The only reliable
          # way to keep the SemVer release (e.g., `4.6.0`) flagged as Latest is
          # to re-assert `make_latest=true` on it after creating the major tag.
          gh release create "${MAJOR}" \
            --repo "${REPO}" \
            --title "${MAJOR}" \
            --generate-notes \
            --latest=false
          echo "Reasserting SemVer release ${SEMVER} as Latest."
          SEMVER_ID="$(gh api "repos/${REPO}/releases/tags/${SEMVER}" --jq '.id')"
          gh api --method PATCH "repos/${REPO}/releases/${SEMVER_ID}" -f make_latest=true >/dev/null
