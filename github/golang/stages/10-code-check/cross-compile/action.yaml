inputs:
  goos:
    description: 'Target OS for single-target mode (e.g., linux, darwin, windows, android). Leave empty for all targets.'
    required: false
    default: ''
  goarch:
    description: 'Target architecture for single-target mode (e.g., amd64, arm64). Leave empty for all targets.'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: 'Checkout code'
      uses: 'actions/checkout@v6'

    - name: 'Setup Go'
      uses: 'actions/setup-go@v6'
      with:
        go-version-file: 'go.mod'
        cache-dependency-path: 'go.sum'

    - name: 'Setup Zig'
      if: inputs.goos == 'android' || inputs.goos == ''
      uses: 'mlugg/setup-zig@v2'

    - uses: 'rios0rios0/pipelines/github/global/abstracts/scripts-repo@main'

    - run: $SCRIPTS_DIR/global/scripts/languages/golang/cross-compile/run.sh
      shell: 'bash'
      env:
        CROSS_GOOS: ${{ inputs.goos }}
        CROSS_GOARCH: ${{ inputs.goarch }}
