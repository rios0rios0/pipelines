variables:
  SEMGREP_LANG: 'java'
  CODEQL_LANGUAGE: 'java'
  # to avoid Out-of-Memory error in this step
  GRADLE_OPTS: '-Xmx2g'

include:
  - remote: 'https://raw.githubusercontent.com/rios0rios0/pipelines/main/gitlab/global/abstracts/default-variables.yaml'
  - remote: 'https://raw.githubusercontent.com/rios0rios0/pipelines/main/gitlab/global/stages/20-security/docker.yaml'
  - remote: 'https://raw.githubusercontent.com/rios0rios0/pipelines/main/gitlab/global/stages/20-security/codeql.yaml'
  - remote: 'https://raw.githubusercontent.com/rios0rios0/pipelines/main/gitlab/global/stages/20-security/hadolint.yaml'
  - remote: 'https://raw.githubusercontent.com/rios0rios0/pipelines/main/gitlab/global/stages/20-security/trivy.yaml'
  - remote: 'https://raw.githubusercontent.com/rios0rios0/pipelines/main/gitlab/global/stages/20-security/trivy-sca.yaml'

sca:dependency-check:
  extends: '.dependency-check'
  stage: 'security (sca/sast)'
  script:
    - mkdir -p '.owasp'
    - export OWASP_PATH="$(pwd)/.owasp" # the Dependency Check data path must be absolute
    # NVD_API_KEY is optional — set it as a CI/CD variable to avoid NVD rate limits
    - gradle dependencyCheckAnalyze
  artifacts:
    when: 'always'
    paths:
      - "$PREFIX$REPORT_PATH/dependency-check-report.html"
    reports:
      dependency_scanning:
        - "$PREFIX$REPORT_PATH/dependency-check-report.xml"
  allow_failure: true

sast:proguard:
  extends: '.gradle'
  stage: 'security (sca/sast)'
  script:
    - gradle classes --quiet
    - wget -q "https://github.com/Guardsquare/proguard/releases/download/v7.6.1/proguard-7.6.1.tar.gz" -O /tmp/proguard.tar.gz
    - tar xzf /tmp/proguard.tar.gz -C /tmp
    - |
      INPUT_JAR=$(find . -path "*/build/libs/*.jar" -not -name "*-sources.jar" -not -name "*-javadoc.jar" | head -1)
      if [ -z "$INPUT_JAR" ]; then INPUT_JAR=$(find . -path "*/build/classes/java/main" -type d | head -1); fi
      if [ -z "$INPUT_JAR" ]; then echo "No compiled classes found"; exit 0; fi
      java -jar /tmp/proguard-7.6.1/lib/proguard.jar \
        -injars "$INPUT_JAR" -outjars /dev/null \
        -libraryjars "$JAVA_HOME/jmods/java.base.jmod(!**.jar;!module-info.class)" \
        -dontoptimize -dontobfuscate -dontwarn \
        -keep 'public class * { public static void main(java.lang.String[]); }' \
        -keep 'public class * { public protected *; }' \
        -printusage proguard-usage.txt
      cat proguard-usage.txt
  allow_failure: true

