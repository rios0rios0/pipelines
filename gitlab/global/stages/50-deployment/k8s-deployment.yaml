variables:
  KUBERNETES_SERVICE_ACCOUNT_OVERWRITE: 'dev-gitlab-runner'
  KUBERNETES_SERVICE_ACCOUNT_OVERWRITE_ALLOWED: '^[a-z]+-gitlab-runner$'

deployment:qa:
  image: 'bitnami/kubectl'
  stage: 'deployment'
  environment:
    name: 'qa'
  script:
    # Add commit SHA label to deployment's pod template (triggers rolling update)
    # Label is exposed via kube_pod_labels metric for Grafana dashboards
    - |
      kubectl patch deployment/$K8S_DEPLOYMENT_NAME --namespace=$K8S_NAMESPACE --type=strategic \
        -p '{"spec":{"template":{"metadata":{"labels":{"app.kubernetes.io/version":"'$CI_COMMIT_SHA'"}}}}}' \
        || kubectl rollout restart deployment/$K8S_DEPLOYMENT_NAME --namespace=$K8S_NAMESPACE
    - kubectl rollout status deployment/$K8S_DEPLOYMENT_NAME --namespace=$K8S_NAMESPACE --timeout=300s
  tags:
    - 'dev-gitlab-runner-onprem'
  rules:
    - if: "$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $K8S_DEPLOYMENT_NAME"

deployment:prod:
  extends: 'deployment:qa'
  environment:
    name: 'prod'
  rules:
    - if: "$CI_COMMIT_TAG && $K8S_DEPLOYMENT_NAME"
