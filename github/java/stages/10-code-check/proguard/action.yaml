runs:
  using: 'composite'
  steps:
    - name: 'Checkout code'
      uses: 'actions/checkout@v6'

    - name: 'Detect build tool'
      id: 'build_tool'
      shell: 'bash'
      run: |
        if [ -f 'pom.xml' ]; then
          echo 'cache=maven' >> "$GITHUB_OUTPUT"
        elif [ -f 'build.gradle' ] || [ -f 'build.gradle.kts' ] || [ -f 'gradlew' ]; then
          echo 'cache=gradle' >> "$GITHUB_OUTPUT"
        else
          echo 'cache=' >> "$GITHUB_OUTPUT"
        fi

    - name: 'Setup Java'
      uses: 'actions/setup-java@v5'
      with:
        distribution: 'temurin'
        java-version: '21'
        cache: ${{ steps.build_tool.outputs.cache }}

    - uses: 'rios0rios0/pipelines/github/global/abstracts/scripts-repo@main'

    - run: $SCRIPTS_DIR/global/scripts/languages/java/proguard/run.sh
      shell: 'bash'

    - name: 'Upload Report'
      uses: 'actions/upload-artifact@v7'
      with:
        name: 'proguard'
        path: 'build/reports/proguard/'
        if-no-files-found: 'error'
        overwrite: 'true'
        retention-days: 10
      if: always()
