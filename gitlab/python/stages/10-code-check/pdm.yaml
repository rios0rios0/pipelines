include:
  - remote: 'https://raw.githubusercontent.com/rios0rios0/pipelines/feat/python-headers/gitlab/python/abstracts/pdm.yaml'

style:isort:
  extends: '.pdm'
  stage: 'code check (style/quality)'
  script:
    - pdm install -v
    - pdm run isort --check-only .

style:black:
  extends: '.pdm'
  stage: 'code check (style/quality)'
  script:
    - pdm install -v
    - pdm run black --check .

quality:flake8:
  extends: '.pdm'
  stage: 'code check (style/quality)'
  script:
    - pdm install -v
    - pdm run flake8 .

quality:mypy:
  extends: '.pdm'
  stage: 'code check (style/quality)'
  script:
    - pdm install -v
    - pdm run type-check
  allow_failure: true
