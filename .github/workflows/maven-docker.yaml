on:
  workflow_call:
    inputs:
      sonar_host:
        description: 'SonarQube/SonarCloud host URL (leave empty to skip SonarQube)'
        required: false
        type: string
        default: ''
    secrets:
      sonar_token:
        description: 'SonarQube authentication token'
        required: false
      NVD_API_KEY:
        description: 'NVD API key for OWASP Dependency-Check (optional)'
        required: false

jobs:
  maven:
    uses: 'rios0rios0/pipelines/.github/workflows/maven.yaml@main'
    with:
      sonar_host: ${{ inputs.sonar_host }}
    secrets:
      sonar_token: ${{ secrets.sonar_token }}
      NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

  # fourth stage
  delivery-release:
    name: 'delivery > release'
    runs-on: 'ubuntu-latest'
    outputs:
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - id: 'release'
        uses: 'rios0rios0/pipelines/github/global/stages/40-delivery/release@main'
    needs: [ 'maven' ]
    if: "github.event_name == 'push' && github.ref == 'refs/heads/main' && contains(github.event.head_commit.message, 'chore/bump-')"

  delivery-docker:
    name: 'delivery > docker'
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'rios0rios0/pipelines/github/global/stages/40-delivery/docker@main'
    needs: [ 'maven' ]
    if: "!failure() && ((github.event_name == 'push' && github.ref == 'refs/heads/main') || startsWith(github.ref, 'refs/tags/'))"
