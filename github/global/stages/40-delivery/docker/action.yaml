inputs:
  github_token:
    description: 'GitHub token for GHCR authentication (defaults to automatic GITHUB_TOKEN)'
    type: 'string'
    required: false
    default: ''
  tags:
    description: 'Docker image tags (computed automatically via docker/metadata-action if not provided)'
    type: 'string'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: 'Checkout code'
      uses: 'actions/checkout@v6'

    - name: 'Extract Docker metadata'
      id: 'meta'
      uses: 'docker/metadata-action@v5'
      with:
        images: 'ghcr.io/${{ github.repository }}'
        tags: |
          type=ref,event=branch
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
      if: "inputs.tags == ''"

    - name: 'Login to Registry'
      uses: 'docker/login-action@v3'
      with:
        registry: 'ghcr.io'
        username: '${{ github.actor }}'
        password: '${{ inputs.github_token || github.token }}'

    - name: 'Build and Push'
      uses: 'docker/build-push-action@v6'
      with:
        file: '.ci/stages/40-delivery/app.Dockerfile'
        context: '.'
        push: true
        tags: '${{ inputs.tags || steps.meta.outputs.tags }}'
