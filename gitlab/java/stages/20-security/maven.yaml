variables:
  SEMGREP_LANG: 'java'
  CODEQL_LANGUAGE: 'java'

include:
  - remote: 'https://raw.githubusercontent.com/rios0rios0/pipelines/main/gitlab/global/abstracts/default-variables.yaml'
  - remote: 'https://raw.githubusercontent.com/rios0rios0/pipelines/main/gitlab/global/stages/2-security.yaml'
  - remote: 'https://raw.githubusercontent.com/rios0rios0/pipelines/main/gitlab/global/stages/20-security/codeql.yaml'
  - remote: 'https://raw.githubusercontent.com/rios0rios0/pipelines/main/gitlab/global/stages/20-security/hadolint.yaml'
  - remote: 'https://raw.githubusercontent.com/rios0rios0/pipelines/main/gitlab/global/stages/20-security/trivy.yaml'
  - remote: 'https://raw.githubusercontent.com/rios0rios0/pipelines/main/gitlab/global/stages/20-security/trivy-sca.yaml'
  - remote: 'https://raw.githubusercontent.com/rios0rios0/pipelines/main/gitlab/java/abstracts/maven.yaml'

sca:dependency-check:
  extends: '.maven'
  stage: 'security (sca)'
  cache:
    paths: # this list can't be merged. It's not how YAML works (https://github.com/yaml/yaml/issues/48)
      - '.m2'
      - '.owasp'
  script:
    - mkdir -p '.owasp'
    - export MAVEN_OPTS="$MAVEN_OPTS -DdataDirectory=$(pwd)/.owasp" # the Dependency Check data path must be absolute
    # NVD_API_KEY is optional — set it as a CI/CD variable to avoid NVD rate limits
    - mvn dependency-check:check
  artifacts:
    when: 'always'
    paths:
      - "$REPORT_PATH/dependency-check-report.html"
  allow_failure: true

sast:pmd:
  extends: '.maven'
  stage: 'security (sca)'
  script:
    - wget -q "https://github.com/pmd/pmd/releases/download/pmd_releases%2F7.13.0/pmd-dist-7.13.0-bin.zip" -O /tmp/pmd.zip
    - unzip -q /tmp/pmd.zip -d /tmp
    - /tmp/pmd-bin-7.13.0/bin/pmd check -d . -R "category/java/bestpractices.xml/UnusedAssignment,category/java/bestpractices.xml/UnusedFormalParameter,category/java/bestpractices.xml/UnusedLocalVariable,category/java/bestpractices.xml/UnusedPrivateField,category/java/bestpractices.xml/UnusedPrivateMethod" -f json --no-cache
  allow_failure: true
