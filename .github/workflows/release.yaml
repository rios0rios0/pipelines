name: 'Release'

on:
  push:
    branches: [ 'main' ]
  workflow_call:
    inputs:
      tag_prefixes:
        type: 'string'
        required: false
        default: '[""]'
        description: 'JSON array of tag prefixes (e.g., ''["", "v"]''). Use ''[""]'' for no prefix.'

permissions:
  contents: 'write'

jobs:
  delivery-release:
    name: 'delivery > release'
    runs-on: 'ubuntu-latest'
    if: "github.event_name == 'push' && github.ref == 'refs/heads/main' && contains(github.event.head_commit.message, 'chore/bump-')"
    outputs:
      tag_name: '${{ steps.release.outputs.tag_name }}'
    strategy:
      matrix:
        prefix: ${{ fromJSON(github.event_name == 'workflow_call' && inputs.tag_prefixes || '[""]') }}
    steps:
      - id: 'release'
        uses: 'rios0rios0/pipelines/github/global/stages/40-delivery/release@main'
        with:
          tag_prefix: '${{ matrix.prefix }}'

  update-major-tag:
    name: 'delivery > update major version tag'
    needs: 'delivery-release'
    if: "needs.delivery-release.outputs.tag_name != ''"
    uses: 'rios0rios0/pipelines/.github/workflows/update-major-version-tag.yaml@main'
    with:
      tag_name: '${{ needs.delivery-release.outputs.tag_name }}'
