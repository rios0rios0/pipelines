runs:
  using: 'composite'
  steps:
    - name: 'Checkout code'
      uses: 'actions/checkout@v6'
      with:
        # Full history is required so `gitleaks detect` can walk every commit
        # of the current branch, and so `origin/<base>` resolves on pull
        # request builds (the run script scopes the scan to `<base>..HEAD`
        # when a PR context is detected).
        fetch-depth: 0

    - name: 'Get Scripts'
      uses: 'rios0rios0/pipelines/github/global/abstracts/scripts-repo@main'

    - name: 'Execute'
      shell: 'bash'
      run: $SCRIPTS_DIR/global/scripts/tools/gitleaks/run.sh

    - name: 'Upload Report'
      uses: 'actions/upload-artifact@v7'
      with:
        name: 'gitleaks'
        path: 'build/reports/gitleaks/'
        if-no-files-found: 'error'
        overwrite: 'true'
        retention-days: 10
      if: always()
