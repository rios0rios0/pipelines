stages:
  - stage: 'code_check'
    displayName: 'code check (style/quality)'
    condition: not(startsWith(variables['Build.SourceBranch'], 'refs/tags/'))
    jobs:
      - template: '../../../global/stages/10-code-check/basic-checks.yaml'

      - job: 'style_isort'
        displayName: 'style:isort'
        steps:
          - template: '../../abstracts/pdm-python3.14.yaml'
          - script: |
              pdm run isort --check-only .
            displayName: 'Run "isort" check'

      - job: 'style_black'
        displayName: 'style:black'
        steps:
          - template: '../../abstracts/pdm-python3.14.yaml'
          - script: |
              pdm run black --check .
            displayName: 'Run "black" check'

      - job: 'quality_flake8'
        displayName: 'quality:flake8'
        steps:
          - template: '../../abstracts/pdm-python3.14.yaml'
          - script: |
              pdm run flake8 .
            displayName: 'Run "flake8" check'

      - job: 'quality_mypy'
        displayName: 'quality:mypy'
        steps:
          - template: '../../abstracts/pdm-python3.14.yaml'
          - script: |
              pdm run type-check
            displayName: 'Run "mypy" check'
        continueOnError: true

      - job: 'quality_vulture'
        displayName: 'quality:vulture'
        steps:
          - template: '../../abstracts/pdm-python3.14.yaml'
          - script: |
              pip install vulture --quiet
              vulture . --min-confidence 80 --exclude .venv
            displayName: 'Run Vulture dead code detection'
        continueOnError: true
