release:
  image: 'alpine:latest'
  stage: 'delivery'
  before_script:
    - |
      # Install dependencies
      apk add --no-cache curl git jq

      # Load variables from the building stage
      # This file contains build artifact information
      [ -f artifacts.env ] && source artifacts.env
  script:
    - |
      # Match the three canonical bump-commit subjects, kept in parity with the
      # Azure DevOps release job:
      #   - git-native merge:      "Merge branch 'chore/bump-X.Y.Z'..."
      #   - conventional commit:   "chore(bump): bumped version to X.Y.Z"
      #   - GitHub-style PR merge: "Merge pull request N from chore/bump-X.Y.Z into main"
      #     (leading `#` and trailing ` into <target>` both optional)
      # `\3` captures the branch-style version, `\4` the conventional one, `\6`
      # the GitHub-style PR-merge one; only one matches, the rest expand to empty.
      REGEX="^Merge (remote-tracking|remote|tracking)? ?branch '(origin\/)?chore\/bump-([0-9]+\.[0-9]+\.[0-9]+)'.*$|.*chore\(bump\):.*version to ([0-9]+\.[0-9]+\.[0-9]+).*|^Merge pull request #?[0-9]+ from (origin\/)?chore\/bump-([0-9]+\.[0-9]+\.[0-9]+)( into .+)?$"

      # Tag-push recovery: a version tag (re-)pushed to recover a bump whose
      # default-branch run failed the quality gate derives its version straight
      # from the tag ref; otherwise fall back to the bump commit subject.
      VERSION=""
      if [ -n "${CI_COMMIT_TAG:-}" ]; then
          VERSION=$(echo "$CI_COMMIT_TAG" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+([.-][0-9]+)?' | head -n 1)
      elif echo "$CI_COMMIT_MESSAGE" | grep -Eq "$REGEX"; then
          VERSION=$(echo "$CI_COMMIT_MESSAGE" | sed -En "s/$REGEX/\3\4\6/p" | head -n 1)
      fi

      if [ -n "$VERSION" ]; then
          RELEASE_NOTES=""
          if [ -f CHANGELOG.md ]; then
              RELEASE_NOTES=$(awk '/## \[Unreleased\]/ {skip=1; next} skip && /## \[.*\]/ {found=1; skip=0; next} found && /## \[.*\]/ {exit} found {print}' CHANGELOG.md)
              RELEASE_NOTES=$(echo "$RELEASE_NOTES" | jq --raw-input --slurp .)
          fi

          DATA="{
            \"name\": \"Release $VERSION\",
            \"tag_name\": \"$VERSION\",
            \"description\": $RELEASE_NOTES,
            \"ref\": \"$CI_COMMIT_SHA\""

          # Add the build artifact link if available
          if [ ! -z "$BUILD_ARTIFACT" ]; then
            DATA="$DATA,
            \"assets\": {
              \"links\": [
                {
                  \"name\": \"$BUILD_ARTIFACT\",
                  \"url\": \"$PACKAGE_REGISTRY_URL/$BUILD_ARTIFACT\"
                }
              ]
            }"
          fi

          DATA="$DATA}"

          curl -XPOST "$CI_API_V4_URL/projects/$CI_PROJECT_ID/releases" \
               --header "JOB-TOKEN: $CI_JOB_TOKEN" \
               --header "Content-Type: application/json" \
               --data "$DATA"
      else
          echo 'Commit is not a bump and ref is not a version tag, not creating a release'
      fi
  rules:
    # Coarse pre-filter; the script REGEX is the source of truth. Allow both the
    # branch-name form (`chore/bump-X.Y.Z`, covers git-native and GitHub PR-merge
    # subjects) and the conventional-commit form (`chore(bump): ... version to X.Y.Z`).
    - if: '$CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH && ($CI_COMMIT_MESSAGE =~ /chore\/bump-[0-9]+\.[0-9]+\.[0-9]+/ || $CI_COMMIT_MESSAGE =~ /chore\(bump\):.*version to [0-9]+\.[0-9]+\.[0-9]+/)'
      when: 'always'
    # Tag-push recovery: a version tag (re-)pushed to recover a bump whose
    # default-branch run failed the gate still cuts the release (the version is
    # taken from the tag ref in the script above).
    - if: '$CI_COMMIT_TAG =~ /^v?[0-9]+\.[0-9]+\.[0-9]+([.-][0-9]+)?$/'
      when: 'always'
    - when: 'never'
