inputs:
  binary_name:
    type: 'string'
    required: true
    description: 'Binary name to be used as default source'
  tag_name:
    type: 'string'
    required: true
    description: 'Tag name to use for the release'

runs:
  using: 'composite'
  steps:
    - name: 'Checkout code'
      uses: 'actions/checkout@v6'
      with:
        fetch-depth: 0

    - name: 'Fetch tags'
      run: git fetch --force --tags
      shell: 'bash'

    - name: 'Setup Go'
      uses: 'actions/setup-go@v6'
      with:
        go-version-file: 'go.mod'
        cache-dependency-path: 'go.sum'

    - name: 'Generate GoReleaser config'
      run: |
        cat > .goreleaser.yaml <<EOF
        version: 2
        project_name: '${{ inputs.binary_name }}'
        builds:
          - env:
              - CGO_ENABLED=0
            goos:
              - linux
              - darwin
              - windows
            goarch:
              - amd64
              - arm64
        archives:
          - formats: ['tar.gz']
            name_template: '{{ .ProjectName }}-{{ .Version }}-{{ .Os }}-{{ .Arch }}'
            format_overrides:
              - goos: windows
                formats: ['zip']
        release:
          mode: keep-existing
        changelog:
          disable: true
        EOF
      shell: 'bash'

    - name: 'Run GoReleaser'
      uses: 'goreleaser/goreleaser-action@v6'
      with:
        distribution: 'goreleaser'
        version: '~> v2'
        args: 'release --clean'
      env:
        GITHUB_TOKEN: ${{ github.token }}
        GORELEASER_CURRENT_TAG: ${{ inputs.tag_name }}
