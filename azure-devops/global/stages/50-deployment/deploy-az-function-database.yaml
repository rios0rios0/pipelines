parameters:
  - name: 'RESOURCE_GROUP_NAME'
    type: 'string'
  - name: 'ENVIRONMENT'
    type: 'string'
  - name: 'AZM_SERVICE_CONNECTION'
    type: 'string'

steps:
  - template: '../../abstracts/deployment.yaml'
    parameters:
      AZM_SERVICE_CONNECTION: ${{ parameters.AZM_SERVICE_CONNECTION }}

  - template: './../abstracts/database.yaml'
    parameters:
      RESOURCE_GROUP_NAME: "$(resourceGroupName)"
      ENVIRONMENT: "$(ENVIRONMENT)"
      AZM_SERVICE_CONNECTION: "$(AZM_SERVICE_CONNECTION)"

  - template: '../../abstracts/deployment-output-setup.yaml'
    parameters:
      RESOURCE_GROUP_NAME: ${{ parameters.RESOURCE_GROUP_NAME }}
      ENVIRONMENT: ${{ parameters.ENVIRONMENT }}
      AZM_SERVICE_CONNECTION: ${{ parameters.AZM_SERVICE_CONNECTION }}
