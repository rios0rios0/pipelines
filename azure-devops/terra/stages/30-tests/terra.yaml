stages:
  - stage: 'tests'
    displayName: 'tests'
    condition: and(succeeded(), not(startsWith(variables['Build.SourceBranch'], 'refs/tags/')))
    variables:
      REPORT_PATH: 'build/reports'
    jobs:
      # Single unified job that orchestrates both tiers of Terraform testing
      # behind one `test:all` entry: native `terraform test` over
      # `modules/*/tests/*.tftest.hcl` (tier 1) followed by the Go Terratest
      # suite under `tests/terratest/` (tier 2). The runner auto-detects
      # which tiers the consumer has, runs only those, and exits 0 when
      # neither is present — so stack-only repos (no `modules/` tests, no
      # `tests/terratest/`) pass the stage without a bespoke opt-out.
      - job: 'test_all'
        displayName: 'test:all'
        steps:
          # Clone rios0rios0/pipelines into a temp dir and expose its path
          # as `$(Scripts.Directory)`. Required by the `run.sh` invocation
          # below — without it the variable resolves to empty, the command
          # becomes `/global/scripts/...`, and the job fails with exit
          # `127` ("command not found"). Sibling stages (`35-management`)
          # already follow this pattern.
          - template: '../../../global/abstracts/scripts-repo.yaml'

          - template: '../../abstracts/terra.yaml'

          # Pin a Go toolchain high enough to satisfy consumer `go.mod`
          # directives. `GOTOOLCHAIN=auto` (the Go 1.21+ default) will
          # transparently fetch a newer toolchain when `go.mod` requires
          # it, so this pin is a lower bound, not a hard version.
          - task: 'GoTool@0'
            displayName: 'Use Go 1.24 (toolchain auto-upgrades per go.mod)'
            inputs:
              version: '1.24'

          # Delegate to the shared unified runner so `make test` and the CI
          # flow exercise identical logic: run terra-test, run terratest if
          # present, merge JUnit + coverage, propagate failures.
          - script: $(Scripts.Directory)/global/scripts/languages/terraform/test-all/run.sh
            displayName: 'Run Terraform tests (terra-test + terratest)'
            env:
              REPORT_PATH: $(REPORT_PATH)

          # Publish the merged JUnit so the Tests tab surfaces every case
          # from both tiers in one place. `condition: always()` so a red
          # tier still publishes the green tier alongside it — the runner
          # propagates the non-zero exit, so the job fails regardless.
          - task: 'PublishTestResults@2'
            displayName: 'Publish Terraform test results (merged)'
            condition: always()
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: '$(REPORT_PATH)/junit-terra-all.xml'
              testRunTitle: 'terra-all'
              failTaskOnFailedTests: true

          # Render the Code Coverage tab in the build summary. Emitted by
          # the terra-test tier as a Cobertura XML where each module is one
          # `<class>` with one `<line>` (covered iff the module has a
          # `tests/*.tftest.hcl`). The ADO tab then shows
          # `tested_modules / total_modules` as a percentage. The task
          # no-ops gracefully when the file is missing (stack-only repo).
          - task: 'PublishCodeCoverageResults@2'
            displayName: 'Publish Terra module coverage'
            condition: always()
            inputs:
              summaryFileLocation: '$(REPORT_PATH)/terra-coverage.xml'
              pathToSources: 'modules'

          # Publish the whole reports directory — the coverage Markdown,
          # the JSON summary, the per-module JUnit files, and the merged
          # JUnit. Downstream stages (SonarQube, Dependency-Track, custom
          # dashboards) can grab them by name from the `terra-coverage`
          # artifact.
          - task: 'PublishPipelineArtifact@1'
            displayName: 'Publish Terra coverage report'
            condition: always()
            inputs:
              targetPath: '$(REPORT_PATH)'
              artifactName: 'terra-coverage'
              publishLocation: 'pipeline'
