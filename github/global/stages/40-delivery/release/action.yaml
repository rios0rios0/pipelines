inputs:
  tag_prefix:
    required: false
    default: ''
    description: 'Tag prefix to use for this release (e.g., "v", "app/"). Leave empty for no prefix.'

outputs:
  tag_name:
    description: 'The tag name created by the release'
    value: ${{ steps.extract.outputs.tag_name }}

runs:
  using: 'composite'
  steps:
    - name: 'Checkout code'
      uses: 'actions/checkout@v6'

    - id: 'extract'
      name: 'Extract Release Version'
      shell: 'bash'
      run: |
        set -eu

        COMMIT_MESSAGE="$(git log -1 --pretty=%B)"
        # GitHub PR merge format: "Merge pull request #XX from repository/chore/bump-X.X.X"
        # GitHub PR merge format: "Merge pull request #XX from repository/bump/X.X.X"
        # Conventional commit format: "chore(bump): bumped to version X.X.X"

        VERSION=""

        # Try GitHub PR merge format: chore/bump-X.X.X
        if echo "$COMMIT_MESSAGE" | grep -Eq "chore/bump-[0-9]+\.[0-9]+\.[0-9]+"; then
          VERSION=$(echo "$COMMIT_MESSAGE" | grep -oE "chore/bump-[0-9]+\.[0-9]+\.[0-9]+" | head -n 1 | sed 's/chore\/bump-//')
        # Try GitHub PR merge format: bump/X.X.X
        elif echo "$COMMIT_MESSAGE" | grep -Eq "bump/[0-9]+\.[0-9]+\.[0-9]+"; then
          VERSION=$(echo "$COMMIT_MESSAGE" | grep -oE "bump/[0-9]+\.[0-9]+\.[0-9]+" | head -n 1 | sed 's/bump\///')
        # Try conventional commit format: chore(bump): ... version X.X.X
        elif echo "$COMMIT_MESSAGE" | grep -Eq "chore\(bump\):.*[0-9]+\.[0-9]+\.[0-9]+"; then
          VERSION=$(echo "$COMMIT_MESSAGE" | grep -oE "[0-9]+\.[0-9]+\.[0-9]+" | head -n 1)
        fi

        if [ -n "$VERSION" ]; then
          echo "tag_name=$VERSION" >> $GITHUB_OUTPUT
        else
          echo "$(date "+%Y-%m-%d %H:%M:%S") - Commit is not a bump, not creating a release..."
          echo "skip_release=true" >> $GITHUB_OUTPUT
        fi

    - name: 'Create Release'
      uses: 'softprops/action-gh-release@v2'
      with:
        draft: false
        prerelease: false
        tag_name: "${{ inputs.tag_prefix }}${{ steps.extract.outputs.tag_name }}"
        generate_release_notes: true
      if: "steps.extract.outputs.skip_release != 'true'"
