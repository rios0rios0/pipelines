name: 'Release Reconcile'

# Scheduled safety net for the "bumped but never released" failure mode: if a
# bump PR merges to main but that main run fails the quality gate, the release
# is never cut even though CHANGELOG.md already carries the version. This job
# diffs the changelog against the tags weekly and re-cuts any missing release.
on:
  schedule:
    - cron: '0 6 * * 1' # weekly, Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: 'write' # push recovery tags
  issues: 'write' # open/update the tracking issue

jobs:
  reconcile:
    uses: 'rios0rios0/pipelines/.github/workflows/release-reconcile.yaml@main'
    secrets:
      # Optional: a PAT so a recovery tag push re-triggers the delivery pipeline
      # (a tag pushed with the default GITHUB_TOKEN does not start workflows).
      # Without it the tags are still created and the gap is reported in an issue.
      recover_token: "${{ secrets.PERSONAL_ACCESS_TOKEN }}"
