include:
  - remote: 'https://raw.githubusercontent.com/rios0rios0/pipelines/main/gitlab/global/abstracts/default-variables.yaml'
  - remote: 'https://raw.githubusercontent.com/rios0rios0/pipelines/main/gitlab/global/abstracts/scripts-repo-alpine-docker.yaml'

# TODO: a good feature is commenting on the PR the findings for each tool
sast:semgrep:
  extends: '.scripts-repo-alpine-docker'
  stage: 'security (sca/sast)'
  # Consumers can configure SSH (or other prerequisites) so the Semgrep
  # Terraform parser can clone private modules referenced via
  # `source = "git@..."` by setting the `SAST_PRE_SCRIPT` variable.
  script:
    - if [ -n "$SAST_PRE_SCRIPT" ]; then sh -c "$SAST_PRE_SCRIPT"; fi
    - $SCRIPTS_DIR/global/scripts/tools/semgrep/run.sh $SEMGREP_LANG # it takes the first param as the main language
  artifacts:
    when: 'always'
    reports:
      sast: "$REPORT_PATH/semgrep.json"
  dependencies: [] # prevent from fetching artifacts

sast:gitleaks:
  extends: '.scripts-repo-alpine-docker'
  stage: 'security (sca/sast)'
  script:
    - $SCRIPTS_DIR/global/scripts/tools/gitleaks/run.sh
  artifacts:
    when: 'always'
    reports:
      secret_detection: "$REPORT_PATH/gitleaks.json"
  dependencies: [] # prevent from fetching artifacts
