.sonarqube:
  image:
    name: 'sonarsource/sonar-scanner-cli:latest'
    entrypoint: [ '' ]
  stage: 'management'
  variables:
    GIT_DEPTH: '0' # tells git fetching all the branches of the project, required by the analysis task
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar" # defines the location of the analysis task cache
  cache:
    key: "${CI_JOB_NAME}"
    paths:
      - '.sonar/cache'
    when: 'always'
  script:
    - |
      # Auto-derive sonar.projectKey and sonar.projectName
      if ! grep -Eq '^[[:space:]]*sonar\.projectKey[[:space:]]*=' sonar-project.properties 2>/dev/null; then
        key="${SONAR_PROJECT_KEY:-$(printf '%s' "$CI_PROJECT_PATH" | tr '[:space:]/' '_' | tr -c '[:alnum:]._:-' '_')}"
        echo "sonar.projectKey=$key" >> sonar-project.properties
        echo "Auto-derived sonar.projectKey=$key"
      fi
      if ! grep -Eq '^[[:space:]]*sonar\.projectName[[:space:]]*=' sonar-project.properties 2>/dev/null; then
        name="${SONAR_PROJECT_NAME:-$CI_PROJECT_NAME}"
        echo "sonar.projectName=$name" >> sonar-project.properties
        echo "Auto-derived sonar.projectName=$name"
      fi
    - |
      # Check if any coverage files exist; if not, clear coverage properties
      # so sonar-scanner doesn't fail looking for files that don't exist
      COVERAGE_FOUND=false
      for pattern in coverage.out coverage/*.xml coverage/*.json coverage/*.lcov build/reports/coverage* build/reports/cobertura.xml; do
        if ls $pattern 1>/dev/null 2>&1; then COVERAGE_FOUND=true; break; fi
      done
      if [ "$COVERAGE_FOUND" = "false" ]; then
        echo "No coverage files found. Running SonarQube without coverage data."
        echo "sonar.coverage.jacoco.xmlReportPaths=" >> sonar-project.properties
        echo "sonar.javascript.lcov.reportPaths=" >> sonar-project.properties
        echo "sonar.python.coverage.reportPaths=" >> sonar-project.properties
        echo "sonar.go.coverage.reportPaths=" >> sonar-project.properties
      fi
    - sonar-scanner
  tags:
    - 'dev-gitlab-runner-onprem'
  rules: # TODO: this could be not duplicated using !reference
    - if: "$CI_MERGE_REQUEST_IID"
    - if: "$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH"

.dependency-track:
  stage: 'management'
  script:
    - 'export REQUEST_CONTENT_TYPE="Content-Type: multipart/form-data"'
    - 'export REQUEST_API_KEY="X-Api-Key: $DEPENDENCY_TRACK_TOKEN"'
    - curl --fail --request 'POST' "$DEPENDENCY_TRACK_HOST_URL/api/v1/bom"
      -H "$REQUEST_CONTENT_TYPE" -H "$REQUEST_API_KEY"
      -F "projectName=$(cat $PREFIX$REPORT_PATH/bom.json | jq -r '.metadata.component.name')"
      -F "projectVersion=$(cat $PREFIX$REPORT_PATH/bom.json | jq -r '.metadata.component.version')"
      -F 'autoCreate=true' -F "bom=@$PREFIX$REPORT_PATH/bom.json"
  tags:
    - 'dev-gitlab-runner-onprem'
  rules: # TODO: this could be not duplicated using !reference
    - if: "$CI_MERGE_REQUEST_IID"
    - if: "$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH"
