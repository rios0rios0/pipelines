parameters:
  # Optional parameter for heavy workloads within JS language. The previous
  # default ``"$(SELF_HOSTED_POOL)"`` was a runtime variable reference that
  # is never an empty string at compile time, so the
  # ``${{ if ne(parameters.SELF_HOSTED_POOL, '') }}`` guard below always
  # emitted a ``pool: name: $(SELF_HOSTED_POOL)`` block. Consumers that do
  # not define the variable saw the job fail during ``Prepare job`` with
  # "Could not find a pool with name ``$(SELF_HOSTED_POOL)``". The default
  # is now an empty string so the guard correctly omits the block when
  # no self-hosted pool is requested.
  - name: 'SELF_HOSTED_POOL'
    type: 'string'
    default: ''
  - name: 'WORKING_DIRECTORY'
    type: 'string'
    default: ''
  - name: 'RUN_BEFORE_TESTS'
    type: 'string'
    default: 'echo "No before script"'
  - name: 'RUN_AFTER_TESTS'
    type: 'string'
    default: 'echo "No after script"'

stages:
  - stage: 'tests'
    displayName: 'tests'
    condition: and(succeeded(), not(startsWith(variables['Build.SourceBranch'], 'refs/tags/')))
    jobs:
      - job: 'test_all'
        displayName: 'test:all'
        steps:
          - template: 'steps/test-all.yaml'
            parameters:
              WORKING_DIRECTORY: "${{ parameters.WORKING_DIRECTORY }}"
              RUN_BEFORE_TESTS: ${{ parameters.RUN_BEFORE_TESTS }}
              RUN_AFTER_TESTS: ${{ parameters.RUN_AFTER_TESTS }}

      - job: 'test_e2e'
        displayName: 'test:e2e'
        continueOnError: true
        ${{ if ne(parameters.SELF_HOSTED_POOL, '') }}:
          pool:
            name: "${{ parameters.SELF_HOSTED_POOL }}"
        steps:
          - template: 'steps/test-e2e.yaml'
            parameters:
              WORKING_DIRECTORY: "${{ parameters.WORKING_DIRECTORY }}"
              RUN_BEFORE_TESTS: ${{ parameters.RUN_BEFORE_TESTS }}
              RUN_AFTER_TESTS: ${{ parameters.RUN_AFTER_TESTS }}
