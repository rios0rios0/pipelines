stages:
    - stage: 'security_sca_sast'
      displayName: 'security (sca/sast)'
      condition: and(succeeded(), not(startsWith(variables['Build.SourceBranch'], 'refs/tags/')))
      jobs:
        - template: '../../../global/stages/20-security/semgrep.yaml'
          parameters:
            SEMGREP_LANGUAGE: 'java'

        - template: '../../../global/stages/20-security/gitleaks.yaml'

        - template: '../../../global/stages/20-security/codeql.yaml'
          parameters:
            CODEQL_LANGUAGE: 'java'

        - template: '../../../global/stages/20-security/hadolint.yaml'

        - template: '../../../global/stages/20-security/trivy.yaml'

        - template: '../../../global/stages/20-security/trivy-sca.yaml'

        - job: 'sca_dependency_check'
          displayName: 'sca:dependency-check'
          # Building the CVE database is the only slow path left, and it is bounded rather than
          # trusted. A cold build now bootstraps from the rate-limit-free NVD datafeed rather than
          # paginating the API, which is what brought this back under a sane ceiling: the API path
          # moved ~30 records/s on a shared runner IP, i.e. >3h for the ~350k-record corpus, so no
          # timeout could have saved it. 45 minutes leaves headroom for the H2 load and the scan
          # itself while still killing a pathological download instead of burning build minutes.
          timeoutInMinutes: 45
          steps:
            - template: '../../abstracts/gradle.yaml'
            - template: '../../../global/abstracts/scripts-repo.yaml'
            # The key rotates daily so the stored snapshot cannot go stale forever, while restoreKeys
            # falls back to the most recent snapshot on any other day, making the usual run an
            # incremental update rather than a rebuild.
            - script: echo "##vso[task.setvariable variable=NVD_CACHE_DATE]$(date -u +%Y-%m-%d)"
              displayName: 'Get current date'
            - task: 'Cache@2'
              inputs:
                key: "owasp-nvd|$(Agent.OS)|$(NVD_CACHE_DATE)"
                restoreKeys: |
                  owasp-nvd|$(Agent.OS)
                path: '.owasp'
              displayName: 'Cache NVD database'
              continueOnError: true
            # NVD_API_KEY is optional but strongly recommended: define it as a pipeline variable to get
            # the authenticated NVD rate limit. Without it the scan falls back to the NVD datafeed —
            # the script's header explains why the unauthenticated API is not usable on shared agents.
            - script: $(Scripts.Directory)/global/scripts/languages/java/dependency-check/run.sh
              displayName: 'Run OWASP Dependency-Check'
              env:
                NVD_API_KEY: $(NVD_API_KEY)
            - task: 'PublishPipelineArtifact@1'
              inputs:
                artifactName: 'dependency-check'
                targetPath: 'build/reports/dependency-check'
              displayName: 'Upload Report'
              condition: always()
          continueOnError: true
