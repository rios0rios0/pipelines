stages:
    - stage: 'security_sca_sast'
      displayName: 'security (sca/sast)'
      condition: and(succeeded(), not(startsWith(variables['Build.SourceBranch'], 'refs/tags/')))
      jobs:
        - template: '../../../global/stages/20-security/docker.yaml'
          parameters:
            SEMGREP_LANGUAGE: 'java'

        - template: '../../../global/stages/20-security/codeql.yaml'
          parameters:
            CODEQL_LANGUAGE: 'java'

        - template: '../../../global/stages/20-security/hadolint.yaml'

        - template: '../../../global/stages/20-security/trivy.yaml'

        - template: '../../../global/stages/20-security/trivy-sca.yaml'

        - job: 'sca_dependency_check'
          displayName: 'sca:dependency-check'
          steps:
            - template: '../../abstracts/gradle.yaml'
            - script: echo "##vso[task.setvariable variable=WEEK_NUMBER]$(date +%Y-%W)"
              displayName: 'Get current week number'
            - task: 'Cache@2'
              inputs:
                key: "$(Agent.JobName)|owasp-nvd|$(WEEK_NUMBER)"
                restoreKeys: |
                  $(Agent.JobName)|owasp-nvd
                path: '.owasp'
              displayName: 'Cache NVD database'
              continueOnError: true
            - script: |
                mkdir -p '.owasp'
                export OWASP_PATH="$(pwd)/.owasp"
                ./gradlew dependencyCheckAnalyze
              displayName: 'Run OWASP Dependency-Check'
              env:
                NVD_API_KEY: $(NVD_API_KEY)
          continueOnError: true

        - job: 'sast_proguard'
          displayName: 'sast:proguard'
          steps:
            - template: '../../abstracts/gradle.yaml'
            - script: |
                ./gradlew classes --quiet
                wget -q "https://github.com/Guardsquare/proguard/releases/download/v7.6.1/proguard-7.6.1.tar.gz" -O /tmp/proguard.tar.gz
                tar xzf /tmp/proguard.tar.gz -C /tmp
                INPUT_JAR=$(find . -path "*/build/libs/*.jar" -not -name "*-sources.jar" -not -name "*-javadoc.jar" | head -1)
                if [ -z "$INPUT_JAR" ]; then INPUT_JAR=$(find . -path "*/build/classes/java/main" -type d | head -1); fi
                if [ -z "$INPUT_JAR" ]; then echo "No compiled classes found"; exit 0; fi
                java -jar /tmp/proguard-7.6.1/lib/proguard.jar \
                  -injars "$INPUT_JAR" -outjars /dev/null \
                  -libraryjars "$JAVA_HOME/jmods/java.base.jmod(!**.jar;!module-info.class)" \
                  -dontoptimize -dontobfuscate -dontwarn \
                  -keep "public class * { public static void main(java.lang.String[]); }" \
                  -keep "public class * { public protected *; }" \
                  -printusage proguard-usage.txt
                cat proguard-usage.txt
              displayName: 'Run ProGuard dead code analysis'
          continueOnError: true
