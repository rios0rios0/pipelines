inputs:
  semgrep_lang:
    required: true
    description: 'Semgrep language to be used as default source'
  pre_script:
    required: false
    default: ''
    description: 'Shell commands run before Semgrep. Useful for configuring SSH so the Terraform parser can clone private modules referenced via `source = "git@..."`.'

runs:
  using: 'composite'
  steps:
    - name: 'Checkout code'
      uses: 'actions/checkout@v6'

    - name: 'Get Scripts'
      uses: 'rios0rios0/pipelines/github/global/abstracts/scripts-repo@main'

    - name: 'Pre-steps'
      if: "inputs.pre_script != ''"
      shell: 'bash'
      run: ${{ inputs.pre_script }}

    - name: 'Execute'
      shell: 'bash'
      run: $SCRIPTS_DIR/global/scripts/tools/semgrep/run.sh "${{ inputs.semgrep_lang }}"

    - name: 'Upload Report'
      uses: 'actions/upload-artifact@v6'
      with:
        name: 'semgrep'
        path: 'build/reports/semgrep/'
        if-no-files-found: 'error'
        overwrite: 'true'
        retention-days: 10
      if: always()
