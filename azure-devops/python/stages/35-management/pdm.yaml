stages:
  - stage: 'management'
    displayName: 'management'
    condition: and(succeeded(), not(startsWith(variables['Build.SourceBranch'], 'refs/tags/')))
    jobs:
      - template: '../../../global/stages/35-management/sonarqube.yaml'
        parameters:
          COVERAGE_ARTIFACT_TARGET_PATH: "$(Build.SourcesDirectory)/build/reports"

      - job: 'report_dependency_track'
        displayName: 'report:dependency-track'
        variables:
          REPORT_PATH: 'build/reports'
        steps:
          # $(Scripts.Directory) was already defined in the line below
          - template: '../../abstracts/pdm-python3.14.yaml'

          - script: $(Scripts.Directory)/global/scripts/languages/python/cyclonedx/run.sh

          - script: $(Scripts.Directory)/global/scripts/tools/dependency-track/run.sh
            # Explicit mapping so the secret `$(DEPENDENCY_TRACK_TOKEN)`
            # reaches the shell as `$DEPENDENCY_TRACK_TOKEN`. Azure
            # Pipelines gates secret variables from the process
            # environment; without this block the script sends an empty
            # `X-Api-Key` header and DT returns `HTTP 401`.
            env:
              DEPENDENCY_TRACK_TOKEN: $(DEPENDENCY_TRACK_TOKEN)
              DEPENDENCY_TRACK_HOST_URL: $(DEPENDENCY_TRACK_HOST_URL)
        continueOnError: true
