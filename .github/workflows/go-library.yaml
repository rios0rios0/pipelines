# see the bottom of the file for more information¹
# the parent workflow is responsible for setting up the call events²
on:
  workflow_call:
    inputs:
      tag_prefixes:
        type: 'string'
        required: false
        default: '["", "v"]'
        description: 'JSON array of tag prefixes (e.g., ''["", "v"]''). Use ''[""]'' for no prefix.'

jobs:
  go:
    uses: 'rios0rios0/pipelines/.github/workflows/go.yaml@main'
    with:
      cross_compile: true

  # fourth stage
  delivery-release:
    name: 'delivery > release'
    runs-on: 'ubuntu-latest'
    outputs:
      tag_name: "${{ steps.release.outputs.tag_name }}"
    strategy:
      matrix:
        prefix: ${{ fromJSON(inputs.tag_prefixes) }}
    steps:
      - id: 'release'
        uses: 'rios0rios0/pipelines/github/global/stages/40-delivery/release@main'
        with:
          tag_prefix: "${{ matrix.prefix }}"
    needs: [ 'go' ]
    if: "github.event_name == 'push' && github.ref == 'refs/heads/main' && (contains(github.event.head_commit.message, 'chore/bump-') || contains(github.event.head_commit.message, 'chore(bump)'))"


# 1 - this file MUST be inside ".github/workflows" because of GitHub Actions limitations
# 2 - the recommended events to trigger this workflow and permissions are:
#   on:
#     push:
#       branches:
#         - 'main'
#       tags:
#         - '*'
#     pull_request:
#       branches:
#         - 'main'
#     workflow_dispatch:
#
#   permissions:
#     checks: 'write' # code_check-style_golangci_lint
#     security-events: 'write' # security-sast_codeql
#     contents: 'write' # delivery-release
#
# workflow_dispatch inputs can only be defined in the workflow that is directly triggered
#
# This workflow will create releases with both no prefix and 'v' prefix (e.g., "1.0.0" and "v1.0.0")
# when a commit with "chore/bump-" or "chore(bump)" message is pushed to main.
