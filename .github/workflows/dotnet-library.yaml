# see the bottom of the file for more information¹
# the parent workflow is responsible for setting up the call events²
on:
  workflow_call:
    inputs:
      tag_prefixes:
        type: 'string'
        required: false
        default: '[""]'
        description: 'JSON array of tag prefixes (e.g., ''["", "v"]''). Use ''[""]'' for no prefix.'

jobs:
  dotnet:
    uses: 'rios0rios0/pipelines/.github/workflows/dotnet.yaml@main'

  # fourth stage
  delivery-release:
    name: 'delivery > release'
    runs-on: 'ubuntu-latest'
    outputs:
      tag_name: '${{ steps.release.outputs.tag_name }}'
    strategy:
      matrix:
        prefix: ${{ fromJSON(inputs.tag_prefixes) }}
    steps:
      - id: 'release'
        uses: 'rios0rios0/pipelines/github/global/stages/40-delivery/release@main'
        with:
          tag_prefix: '${{ matrix.prefix }}'
    needs: [ 'dotnet' ]
    # Cut on a main-branch bump merge, OR on a version-tag push so a bump whose
    # main run failed the quality gate can be recovered by (re-)pushing its tag.
    # The two triggers are gated separately with explicit status functions: the
    # main path keeps success() (never release when the gate failed), while the
    # tag path uses !cancelled() so it still runs when the gate SKIPS on tags —
    # every job in dotnet.yaml skips on refs/tags/*, which makes the `dotnet` need
    # conclude "skipped", and an implicit success() would then skip delivery too.
    # 40-delivery/release derives the version from the tag ref on the tag path.
    if: "(success() && github.event_name == 'push' && github.ref == 'refs/heads/main' && (contains(github.event.head_commit.message, 'chore/bump-') || contains(github.event.head_commit.message, 'chore(bump)'))) || (!cancelled() && startsWith(github.ref, 'refs/tags/'))"


# 1 - this file MUST be inside ".github/workflows" because of GitHub Actions limitations
# 2 - the recommended events to trigger this workflow and permissions are:
#   on:
#     push:
#       branches:
#         - 'main'
#       tags:
#         - '*'
#     pull_request:
#       branches:
#         - 'main'
#     workflow_dispatch:
#
#   permissions:
#     checks: 'write' # tests-test_all (test results annotations)
#     security-events: 'write' # security-sast_codeql
#     actions: 'read' # security-sast_codeql (required only on a private repository)
#     contents: 'write' # delivery-release
#
# This workflow validates a .NET library/NuGet package and creates a release tag when
# a version-bump commit is pushed to main. Pass tag_prefixes='["", "v"]'
# to publish both a plain tag (e.g., "1.0.0") and a v-prefixed tag (e.g., "v1.0.0").
