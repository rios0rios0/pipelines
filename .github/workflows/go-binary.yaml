# see the bottom of the file for more information¹
# the parent workflow is responsible for setting up the call events²
on:
  workflow_call:
    inputs:
      binary_name:
        type: 'string'
        required: true
        description: 'Binary name to be used as default source'
      binary_path:
        type: 'string'
        required: false
        default: '.'
        description: 'Path to the main package (e.g. ./cmd/terra). Defaults to auto-detection.'
      sonar_host:
        description: 'SonarQube/SonarCloud host URL (leave empty to skip SonarQube)'
        required: false
        type: string
        default: ''
      deliver_docker:
        type: 'boolean'
        required: false
        default: false
        description: 'Also build and push a Docker image to ghcr.io/<owner>/<repo>. Mirrors the delivery-docker job from go-docker.yaml, publishing latest on main pushes and workflow_dispatch runs, and versioned images for tags/releases.'
      gpg_sign:
        type: 'boolean'
        required: false
        default: false
        description: 'When true, import a GPG key during delivery-binary so GoReleaser can populate GPG_FINGERPRINT and run a `signs:` block. Required for projects that publish a signed SHA256SUMS (e.g., Terraform providers). Consumers must also pass the gpg_private_key and gpg_passphrase secrets.'
    secrets:
      sonar_token:
        description: 'SonarQube authentication token'
        required: false
      gpg_private_key:
        description: 'Armored GPG private key used to sign release artifacts (only consumed when gpg_sign: true).'
        required: false
      gpg_passphrase:
        description: 'Passphrase for the GPG key in gpg_private_key (only consumed when gpg_sign: true).'
        required: false

jobs:
  go:
    uses: 'rios0rios0/pipelines/.github/workflows/go.yaml@main'
    with:
      sonar_host: ${{ inputs.sonar_host }}
    secrets:
      sonar_token: ${{ secrets.sonar_token }}

  # fourth stage
  delivery-release:
    name: 'delivery > release'
    runs-on: 'ubuntu-latest'
    outputs:
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - id: 'release'
        uses: 'rios0rios0/pipelines/github/global/stages/40-delivery/release@main'
    needs: [ 'go' ]
    if: "github.event_name == 'push' && github.ref == 'refs/heads/main' && contains(github.event.head_commit.message, 'chore/bump-')"

  delivery-binary:
    name: 'delivery > binary'
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'rios0rios0/pipelines/github/golang/stages/40-delivery/binary@main'
        with:
          binary_name: "${{ inputs.binary_name || github.event.repository.name }}"
          binary_path: "${{ inputs.binary_path }}"
          tag_name: "${{ needs.delivery-release.outputs.tag_name || github.ref_name }}"
          gpg_sign: "${{ inputs.gpg_sign }}"
        env:
          GPG_PRIVATE_KEY: '${{ secrets.gpg_private_key }}'
          GPG_PASSPHRASE: '${{ secrets.gpg_passphrase }}'
    needs: [ 'go', 'delivery-release' ]
    if: "!failure() && (startsWith(github.ref, 'refs/tags/') || needs.delivery-release.outputs.tag_name != '')"

  delivery-docker:
    name: 'delivery > docker'
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'rios0rios0/pipelines/github/global/stages/40-delivery/docker@main'
        with:
          tag_name: "${{ needs.delivery-release.outputs.tag_name }}"
    needs: [ 'go', 'delivery-release' ]
    if: "inputs.deliver_docker && !failure() && ((github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/'))"


# 1 - this file MUST be inside ".github/workflows" because of GitHub Actions limitations
# 2 - the recommended events to trigger this workflow and permissions are:
#   on:
#     push:
#       branches:
#         - 'main'
#       tags:
#         - '*'
#     pull_request:
#       branches:
#         - 'main'
#     workflow_dispatch:
#
#   permissions:
#     checks: 'write' # code_check-style_golangci_lint
#     security-events: 'write' # security-sast_codeql
#     contents: 'write' # delivery-release
#     packages: 'write' # delivery-docker (only when deliver_docker: true, to push to ghcr.io)
#
# workflow_dispatch inputs can only be defined in the workflow that is directly triggered
