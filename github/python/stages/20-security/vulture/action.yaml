inputs:
  python_version:
    required: false
    default: '3.13'
    description: 'Python version to use'

runs:
  using: 'composite'
  steps:
    - name: 'Checkout code'
      uses: 'actions/checkout@v6'

    - name: 'Setup Python'
      uses: 'actions/setup-python@v6'
      with:
        python-version: '${{ inputs.python_version }}'

    - name: 'Install PDM and dependencies'
      run: |
        python -m pip install pdm
        pdm install -v
      shell: 'bash'

    - uses: 'rios0rios0/pipelines/github/global/abstracts/scripts-repo@main'

    - run: $SCRIPTS_DIR/global/scripts/languages/python/vulture/run.sh
      shell: 'bash'

    - name: 'Upload Report'
      uses: 'actions/upload-artifact@v6'
      with:
        name: 'vulture'
        path: 'build/reports/vulture/'
        if-no-files-found: 'error'
        overwrite: 'true'
        retention-days: 10
      if: always()
