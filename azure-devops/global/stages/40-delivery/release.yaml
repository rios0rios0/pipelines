parameters:
  - name: 'TAG_PREFIXES'
    type: 'object'
    default:
      - ''

jobs:
  - job: 'release'
    displayName: 'release'
    # Gate on main-only. The previous `contains()` substring match on
    # `Build.SourceVersionMessage` was a false-positive trap — any commit
    # message that happened to include the literal text `chore/bump-` or
    # `chore(bump)` (e.g. `refactor: clarified chore(bump) workflow`) would
    # pass the condition. The bash regex below is the actual source of truth:
    # it matches only the two canonical bump formats and sets SKIP_RELEASE=true
    # for anything else, so the subsequent tag-creation steps no-op cleanly.
    # Cost of dropping the substring filter is one ~30s job spin-up per merged
    # commit on main — acceptable for correctness.
    # Gate on the default branch, OR on a version-tag push so a bump whose main
    # run failed the gate can be recovered by (re-)pushing its tag (the version
    # is then taken from the tag ref in the Extract Release Version step).
    condition: and(succeeded(), or(eq(variables['Build.SourceBranch'], 'refs/heads/main'), startsWith(variables['Build.SourceBranch'], 'refs/tags/')))
    steps:
      - script: |
          # Deliberately NOT `set -x` here. COMMIT_MESSAGE is user-controlled
          # (it is the merged commit body / PR description) and may contain a
          # literal `##vso[...]` or `##[...]` token. Under xtrace, bash echoes
          # the expanded command lines — including the raw message — to the log,
          # where the Azure DevOps agent re-parses the token as a (malformed)
          # logging command and fails the step. A PR whose description merely
          # mentioned `##vso[task.setvariable]` took the release job down this
          # way. With xtrace off, the message stays inside the grep/sed pipes
          # and never reaches the log.
          set -eu

          COMMIT_MESSAGE="$(git log -1 --pretty=%B)"
          # Canonical bump commit formats. Anything else → SKIP_RELEASE=true.
          #   - Git/Azure native merge: "Merge branch 'chore/bump-X.Y.Z'..."
          #   - Conventional commit:    "chore(bump): bumped version to X.Y.Z"
          #   - GitHub-style PR merge:  "Merge pull request N from chore/bump-X.Y.Z into main"
          #     Produced by auto-complete / bots (e.g. code-guru) merging the bump
          #     PR without squashing. The version lives only in the branch name, so
          #     the conventional-commit branch above never matches it. The leading
          #     `#` and the trailing ` into <target>` are both optional. The GitHub
          #     Actions counterpart already handles this format; this keeps the
          #     Azure DevOps job in parity.
          # `\3` captures the branch-style version, `\4` the conventional one,
          # `\6` the GitHub-style PR-merge one.
          REGEX="^Merge (remote-tracking|remote|tracking)? ?branch '(origin\/)?chore\/bump-([0-9]+\.[0-9]+\.[0-9]+)'.*$|.*chore\(bump\):.*version to ([0-9]+\.[0-9]+\.[0-9]+).*|^Merge pull request #?[0-9]+ from (origin\/)?chore\/bump-([0-9]+\.[0-9]+\.[0-9]+)( into .+)?$"

          VERSION=""
          # Tag-push recovery: derive the version straight from the tag ref when
          # triggered by a version tag (the Build.SourceBranch macro is
          # substituted by the agent before this script runs). Ref names are not
          # user-controlled, so this stays clear of the xtrace concern above.
          case "$(Build.SourceBranch)" in
            refs/tags/*)
              VERSION=$(printf '%s' "$(Build.SourceBranchName)" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+([.-][0-9]+)?' | head -n 1)
              ;;
          esac
          if [ -z "$VERSION" ] && echo -n "$COMMIT_MESSAGE" | grep -Eq "$REGEX"; then
            VERSION=$(echo "$COMMIT_MESSAGE" | sed -En "s/$REGEX/\3\4\6/p" | head -n 1)
          fi

          if [ -n "$VERSION" ]; then
            echo "##vso[task.setvariable variable=RELEASE_VERSION]$VERSION"
          else
            echo "$(date "+%Y-%m-%d %H:%M:%S") - Commit is not a bump and ref is not a version tag, not creating a release..."
            echo "##vso[task.setvariable variable=SKIP_RELEASE]true"
          fi
        displayName: 'Extract Release Version'

      - ${{ each prefix in parameters.TAG_PREFIXES }}:
          - script: |
              set -ex

              # only run if extraction found a version
              if [ "${SKIP_RELEASE:-}" = "true" ]; then
                echo "Skipping tag creation for prefix '${VERSION_PREFIX:-}' because no bump commit was detected."
                exit 0
              fi
              if [ -z "${RELEASE_VERSION:-}" ]; then
                echo "##[warning]RELEASE_VERSION is empty — nothing to tag for prefix '${VERSION_PREFIX:-}'."
                exit 0
              fi

              RESPONSE_FILE=$(mktemp)
              DATA_FILE=$(mktemp)
              # Cleanup the temp files on every exit path: normal completion,
              # `exit 1` in the default case, or `set -e` aborting on a curl failure
              # (network/TLS/etc).
              trap 'rm -f "$RESPONSE_FILE" "$DATA_FILE"' EXIT

              RELEASE_NOTES=""
              if [ -f CHANGELOG.md ]; then
                  RELEASE_NOTES=$(awk '/## \[Unreleased\]/ {skip=1; next} skip && /## \[.*\]/ {found=1; skip=0; next} found && /## \[.*\]/ {exit} found {print}' CHANGELOG.md)
                  RELEASE_NOTES=$(echo "$RELEASE_NOTES" | jq --raw-input --slurp .)
              fi

              # RELEASE_NOTES comes from CHANGELOG.md (user-controlled) and may
              # contain a literal `##vso[...]`/`##[...]` token. Build the request
              # body with xtrace OFF and POST it from a file (`--data-binary @`)
              # so the notes are never echoed to the log — neither by a traced
              # `DATA=...` assignment nor by traced curl arguments — where the
              # Azure DevOps agent would re-parse the token as a logging command.
              # The traced curl line shows only `--data-binary @<tmpfile>`.
              { set +x; } 2>/dev/null
              DATA="{
                \"name\": \"${VERSION_PREFIX}${RELEASE_VERSION:-}\",
                \"taggedObject\": {
                  \"objectId\": \"$(Build.SourceVersion)\"
                },
                \"message\": $RELEASE_NOTES
              }"
              printf '%s' "$DATA" > "$DATA_FILE"
              { set -x; } 2>/dev/null

              # Tag creation is idempotent:
              #   * If the tag already exists (AutoBump pre-created it when opening the bump PR,
              #     or a prior pipeline run partially succeeded), the `annotatedtags` endpoint
              #     returns HTTP 409 Conflict. That is a no-op, not a failure.
              #   * 429 / 5xx are transient and retried in bash (see loop below).
              #   * 400 / 401 / 403 / 404 are genuine failures and must abort the stage.
              # `curl` exits 0 on HTTP 4xx/5xx unless `--fail` is passed, and `set -e` only
              # reacts to non-zero exits. So we capture the body + status, pick the outcome
              # from the status, and surface the body on genuine failures.
              #
              # Retry handling: curl's own `--retry` only kicks in when curl itself exits
              # non-zero (which requires `--fail`), but `--fail` would make 409 abort the
              # script before we can recognize it as success. So we drive the retry loop
              # in bash on the captured HTTP_STATUS — same behaviour, no curl-version
              # dependency, no extra binaries to install.
              #
              # Transport-level failures (DNS/TLS/timeout/connection reset) make curl exit
              # non-zero before any HTTP_STATUS is captured. Under `set -e` that would abort
              # the step instantly and skip the retry loop, so the curl invocation runs with
              # `set +e` around it: we capture the exit code, synthesize HTTP_STATUS="000"
              # on transport failure, and let the same retry case-statement handle it.
              TAG_NAME="${VERSION_PREFIX}${RELEASE_VERSION:-}"
              MAX_ATTEMPTS=5
              RETRY_DELAY=5
              HTTP_STATUS=""
              CURL_EXIT_CODE=0
              for attempt in $(seq 1 "$MAX_ATTEMPTS"); do
                set +e
                HTTP_STATUS=$(curl --silent --show-error \
                                   -o "$RESPONSE_FILE" -w "%{http_code}" \
                                   -X POST "$(System.TeamFoundationCollectionUri)$(System.TeamProject)/_apis/git/repositories/$(Build.Repository.ID)/annotatedtags?api-version=7.1-preview.1" \
                                   --header "Authorization: Bearer $(System.AccessToken)" \
                                   --header "Content-Type: application/json" \
                                   --data-binary "@$DATA_FILE")
                CURL_EXIT_CODE=$?
                set -e

                if [ "$CURL_EXIT_CODE" -ne 0 ]; then
                  HTTP_STATUS="000"
                fi

                case "$HTTP_STATUS" in
                  000|429|500|502|503|504)
                    if [ "$attempt" -lt "$MAX_ATTEMPTS" ]; then
                      if [ "$HTTP_STATUS" = "000" ]; then
                        echo "Transient curl transport failure (exit $CURL_EXIT_CODE) from annotatedtags; retrying ($attempt/$MAX_ATTEMPTS) after ${RETRY_DELAY}s..."
                      else
                        echo "Transient HTTP $HTTP_STATUS from annotatedtags; retrying ($attempt/$MAX_ATTEMPTS) after ${RETRY_DELAY}s..."
                      fi
                      sleep "$RETRY_DELAY"
                      continue
                    fi
                    ;;
                esac
                break
              done

              case "$HTTP_STATUS" in
                200|201)
                  echo "Tag '$TAG_NAME' created."
                  ;;
                409)
                  echo "Tag '$TAG_NAME' already exists (HTTP 409). Skipping — AutoBump or a prior run already created it."
                  ;;
                000)
                  echo "Tag creation failed: curl transport error (exit $CURL_EXIT_CODE) after $MAX_ATTEMPTS attempt(s)."
                  exit 1
                  ;;
                *)
                  echo "Tag creation failed with HTTP $HTTP_STATUS after $MAX_ATTEMPTS attempt(s). Response body:"
                  cat "$RESPONSE_FILE"
                  exit 1
                  ;;
              esac
            displayName: "Create Tag w/ Prefix '${{ prefix }}'"
            env:
              VERSION_PREFIX: "${{ prefix }}"
