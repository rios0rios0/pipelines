# Terra CLI pipeline — uses the terra CLI (https://github.com/rios0rios0/terra)
# which wraps Terraform and Terragrunt. Provides code check, security, tests,
# and management stages. Delivery is intentionally excluded because it is
# project-specific (plan/apply targets, environment handling, stack ordering).
#
# Usage in your azure-pipelines.yml:
#   resources:
#     repositories:
#       - repository: 'pipelines'
#         type: 'github'
#         name: 'rios0rios0/pipelines'
#         endpoint: 'YOUR_GITHUB_SERVICE_CONNECTION'
#
#   stages:
#     - template: 'azure-devops/terra/terra.yaml@pipelines'
#     # Add your project-specific delivery stage here:
#     - template: '.ci/stages/40-delivery/terra.yaml'

stages:
  - template: 'stages/10-code-check/terra.yaml'
  - template: 'stages/20-security/terra.yaml'
  - template: 'stages/30-tests/terra.yaml'
  - template: 'stages/35-management/terra.yaml'
