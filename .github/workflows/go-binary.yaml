# see the bottom of the file for more information¹
# the parent workflow is responsible for setting up the call events²
on:
  workflow_call:
    inputs:
      binary_name:
        type: 'string'
        required: true
        description: 'Binary name to be used as default source'
      binary_path:
        type: 'string'
        required: false
        default: '.'
        description: 'Path to the main package (e.g. ./cmd/terra). Defaults to auto-detection.'
      sonar_host:
        description: 'SonarQube/SonarCloud host URL (leave empty to skip SonarQube)'
        required: false
        type: string
        default: ''
    secrets:
      sonar_token:
        description: 'SonarQube authentication token'
        required: false

jobs:
  go:
    uses: 'rios0rios0/pipelines/.github/workflows/go.yaml@main'
    with:
      sonar_host: ${{ inputs.sonar_host }}
    secrets:
      sonar_token: ${{ secrets.sonar_token }}

  # fourth stage
  delivery-release:
    name: 'delivery > release'
    runs-on: 'ubuntu-latest'
    outputs:
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - id: 'release'
        uses: 'rios0rios0/pipelines/github/global/stages/40-delivery/release@main'
    needs: [ 'go' ]
    if: "github.event_name == 'push' && github.ref == 'refs/heads/main' && contains(github.event.head_commit.message, 'chore/bump-')"

  delivery-binary:
    name: 'delivery > binary'
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'rios0rios0/pipelines/github/golang/stages/40-delivery/binary@main'
        with:
          binary_name: "${{ inputs.binary_name || github.event.repository.name }}"
          binary_path: "${{ inputs.binary_path }}"
          tag_name: "${{ needs.delivery-release.outputs.tag_name || github.ref_name }}"
    needs: [ 'go', 'delivery-release' ]
    if: "!failure() && (startsWith(github.ref, 'refs/tags/') || needs.delivery-release.outputs.tag_name != '')"


# 1 - this file MUST be inside ".github/workflows" because of GitHub Actions limitations
# 2 - the recommended events to trigger this workflow and permissions are:
#   on:
#     push:
#       branches:
#         - 'main'
#       tags:
#         - '*'
