parameters:
  - name: 'RUN_BEFORE_CODE_CHECK'
    type: 'string'
    default: 'echo "No before script"'
  - name: 'RUN_AFTER_CODE_CHECK'
    type: 'string'
    default: 'echo "No after script"'
  - name: 'WORKING_DIRECTORY'
    type: 'string'
    default: ''

stages:
  - stage: 'code_check'
    displayName: 'code check (style/quality)'
    condition: not(startsWith(variables['Build.SourceBranch'], 'refs/tags/'))
    jobs:
      - template: '../../../global/stages/10-code-check/basic-checks.yaml'

      - job: 'style_eslint'
        displayName: 'style:eslint'
        steps:
          - template: 'steps/eslint.yaml'
            parameters:
              WORKING_DIRECTORY: "${{ parameters.WORKING_DIRECTORY }}"
              RUN_BEFORE_CODE_CHECK: ${{ parameters.RUN_BEFORE_CODE_CHECK }}
              RUN_AFTER_CODE_CHECK: ${{ parameters.RUN_AFTER_CODE_CHECK }}

      - job: 'quality_knip'
        displayName: 'quality:knip'
        steps:
          - template: '../../abstracts/corepack-node20.18.3-no-cache.yaml'
          - script: npx --yes knip
            displayName: 'Run Knip unused code detection'
        continueOnError: true
