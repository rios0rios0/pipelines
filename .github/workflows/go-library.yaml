# see the bottom of the file for more information¹
# the parent workflow is responsible for setting up the call events²
on:
  workflow_call:
    inputs:
      tag_prefixes:
        type: 'string'
        required: false
        default: '["", "v"]'
        description: 'JSON array of tag prefixes (e.g., ''["", "v"]''). Use ''[""]'' for no prefix.'
      sonar_host:
        description: 'SonarQube/SonarCloud host URL (leave empty to skip SonarQube)'
        required: false
        type: string
        default: ''
    secrets:
      sonar_token:
        description: 'SonarQube authentication token'
        required: false

jobs:
  # first stage
  code_check-basic_checks:
    name: 'code-check > quality:basic-checks'
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'rios0rios0/pipelines/github/global/stages/10-code-check/basic-checks@main'
        with:
          target_branch: ${{ github.event.pull_request.base.ref || github.event.repository.default_branch || 'main' }}
    if: "github.event_name == 'pull_request'"

  code_check-style_golangci_lint:
    name: 'code-check > style:golangci-lint'
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'rios0rios0/pipelines/github/golang/stages/10-code-check/golangci-lint@main'
    continue-on-error: true
    if: "!startsWith(github.ref, 'refs/tags/')"

  code_check-cross_compile:
    name: 'code-check > quality:cross-compile (${{ matrix.goos }}/${{ matrix.goarch }})'
    runs-on: 'ubuntu-latest'
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: 'linux'
            goarch: 'amd64'
          - goos: 'linux'
            goarch: 'arm64'
          - goos: 'darwin'
            goarch: 'amd64'
          - goos: 'darwin'
            goarch: 'arm64'
          - goos: 'windows'
            goarch: 'amd64'
          - goos: 'windows'
            goarch: 'arm64'
          - goos: 'android'
            goarch: 'amd64'
          - goos: 'android'
            goarch: 'arm64'
    steps:
      - uses: 'rios0rios0/pipelines/github/golang/stages/10-code-check/cross-compile@main'
        with:
          goos: ${{ matrix.goos }}
          goarch: ${{ matrix.goarch }}
    if: "!startsWith(github.ref, 'refs/tags/')"


  # second stage
  security-sast_codeql:
    name: 'security > sast:codeql'
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'rios0rios0/pipelines/github/global/stages/20-security/codeql@main'
        with:
          codeql_language: 'go'
    needs: [ 'code_check-style_golangci_lint' ]
    if: "!startsWith(github.ref, 'refs/tags/')"

  security-sast_semgrep:
    name: 'security > sast:semgrep'
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'rios0rios0/pipelines/github/global/stages/20-security/docker-semgrep@main'
        with:
          semgrep_lang: 'golang'
    needs: [ 'code_check-style_golangci_lint' ]
    if: "!startsWith(github.ref, 'refs/tags/')"

  security-sast_gitleaks:
    name: 'security > sast:gitleaks'
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'rios0rios0/pipelines/github/global/stages/20-security/docker-gitleaks@main'
    needs: [ 'code_check-style_golangci_lint' ]
    if: "!startsWith(github.ref, 'refs/tags/')"

  security-sast_hadolint:
    name: 'security > sast:hadolint'
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'rios0rios0/pipelines/github/global/stages/20-security/hadolint@main'
    needs: [ 'code_check-style_golangci_lint' ]
    continue-on-error: true
    if: "!startsWith(github.ref, 'refs/tags/')"

  security-sast_trivy:
    name: 'security > sast:trivy'
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'rios0rios0/pipelines/github/global/stages/20-security/trivy@main'
    needs: [ 'code_check-style_golangci_lint' ]
    continue-on-error: true
    if: "!startsWith(github.ref, 'refs/tags/')"

  security-sca_trivy:
    name: 'security > sca:trivy'
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'rios0rios0/pipelines/github/global/stages/20-security/trivy-sca@main'
    needs: [ 'code_check-style_golangci_lint' ]
    continue-on-error: true
    if: "!startsWith(github.ref, 'refs/tags/')"

  security-sca_govulncheck:
    name: 'security > sca:govulncheck'
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'rios0rios0/pipelines/github/golang/stages/20-security/govulncheck@main'
    needs: [ 'code_check-style_golangci_lint' ]
    continue-on-error: true
    if: "!startsWith(github.ref, 'refs/tags/')"


  # third stage
  tests-test_all:
    name: 'tests > test:all'
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'rios0rios0/pipelines/github/golang/stages/30-tests/all@main'

      - name: 'Test Results'
        if: "always() && hashFiles('junit.xml') != ''"
        uses: 'dorny/test-reporter@v1'
        with:
          name: 'Test Results'
          path: 'junit.xml'
          reporter: 'java-junit'

      - name: 'Upload Coverage Report'
        if: "always() && hashFiles('coverage.txt') != ''"
        uses: 'actions/upload-artifact@v4'
        with:
          name: 'coverage-report'
          path: |
            coverage.txt
            cobertura.xml
          if-no-files-found: ignore
          retention-days: 30
    needs: [ 'security-sast_codeql', 'security-sast_semgrep', 'security-sast_gitleaks', 'security-sast_hadolint', 'security-sast_trivy', 'security-sca_trivy', 'security-sca_govulncheck' ]
    if: "!startsWith(github.ref, 'refs/tags/')"


  # management stage (optional)
  management-report_sonarqube:
    name: 'management > report:sonarqube'
    runs-on: 'ubuntu-latest'
    container:
      image: 'sonarsource/sonar-scanner-cli:6.2.1'
    needs: [ 'tests-test_all' ]
    if: "inputs.sonar_host != '' && !startsWith(github.ref, 'refs/tags/')"
    continue-on-error: true
    steps:
      - name: 'Checkout code'
        uses: 'actions/checkout@v6'
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: 'Download coverage artifact'
        uses: 'actions/download-artifact@v4'
        with:
          name: 'coverage-report'
          path: '.'
        continue-on-error: true

      - name: 'Checkout scripts'
        uses: 'rios0rios0/pipelines/github/global/abstracts/scripts-repo@main'

      - name: 'Run SonarQube'
        run: '${{ env.SCRIPTS_DIR }}/global/scripts/tools/sonarqube/run.sh'
        shell: 'bash'
        env:
          SONAR_HOST_URL: ${{ inputs.sonar_host }}
          SONAR_TOKEN: ${{ secrets.sonar_token }}


  # fourth stage
  delivery-release:
    name: 'delivery > release'
    runs-on: 'ubuntu-latest'
    outputs:
      tag_name: "${{ steps.release.outputs.tag_name }}"
    strategy:
      matrix:
        prefix: ${{ fromJSON(inputs.tag_prefixes) }}
    steps:
      - id: 'release'
        uses: 'rios0rios0/pipelines/github/global/stages/40-delivery/release@main'
        with:
          tag_prefix: "${{ matrix.prefix }}"
    needs: [ 'tests-test_all', 'management-report_sonarqube' ]
    if: "github.event_name == 'push' && github.ref == 'refs/heads/main' && contains(github.event.head_commit.message, 'chore/bump-')"


# 1 - this file MUST be inside ".github/workflows" because of GitHub Actions limitations
# 2 - the recommended events to trigger this workflow and permissions are:
#   on:
#     push:
#       branches:
#         - 'main'
#       tags:
#         - '*'
#     pull_request:
#       branches:
#         - 'main'
#     workflow_dispatch:
#
#   permissions:
#     checks: 'write' # code_check-style_golangci_lint
#     security-events: 'write' # security-sast_codeql
#     contents: 'write' # delivery-release
#
# workflow_dispatch inputs can only be defined in the workflow that is directly triggered
#
# This workflow will create releases with both no prefix and 'v' prefix (e.g., "1.0.0" and "v1.0.0")
# when a commit with "chore/bump-" message is pushed to main.
