parameters:
  - name: 'DOCKER_BUILD_ARGS'
    type: 'string'
    default: ''
  - name: 'RUN_BEFORE_BUILD'
    type: 'string'
    default: ''

stages:
  - template: 'stages/10-code-check/go.yaml'
  - template: 'stages/20-security/go.yaml'
  - template: 'stages/30-tests/go.yaml'
  - template: 'stages/35-management/go.yaml'
  - template: 'stages/40-delivery/docker.yaml'
    parameters:
      DOCKER_BUILD_ARGS: ${{ parameters.DOCKER_BUILD_ARGS }}
      RUN_BEFORE_BUILD: ${{ parameters.RUN_BEFORE_BUILD }}

  # Optional K8s deployment stage - only runs if K8S_DEPLOYMENT_NAME variable is set
  - stage: 'deployment'
    displayName: 'Kubernetes Deployment'
    dependsOn: 'delivery'
    condition: and(succeeded(), ne(variables['K8S_DEPLOYMENT_NAME'], ''), or(startsWith(variables['Build.SourceBranch'], 'refs/tags/'), startsWith(variables['Build.SourceBranch'], 'refs/heads/main')))
    jobs:
      - job: 'deploy'
        displayName: 'Deploy to Kubernetes'
        steps:
          - template: '../global/stages/50-deployment/k8s-deployment.yaml'
            parameters:
              K8S_SERVICE_CONNECTION: '$(K8S_ENDPOINT)'
              K8S_NAMESPACE: '$(K8S_NAMESPACE)'
              K8S_DEPLOYMENT_NAME: '$(K8S_DEPLOYMENT_NAME)'
