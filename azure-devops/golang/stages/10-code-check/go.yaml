parameters:
  - name: 'DEPENDS_ON'
    type: object
    default: ''

stages:
  - stage: 'code_check'
    displayName: 'code check (style/quality)'
    condition: not(startsWith(variables['Build.SourceBranch'], 'refs/tags/'))
    ${{ if ne(parameters.DEPENDS_ON, '') }}:
      dependsOn: ${{ parameters.DEPENDS_ON }}
    jobs:
      - template: '../../../global/stages/10-code-check/basic-checks.yaml'

      - job: 'style_golangci_lint'
        displayName: 'style:golangci-lint'
        variables:
          GOPATH: "$(Pipeline.Workspace)/.go"
        steps:
          # $(Scripts.Directory) was already defined in the line below
          - template: '../../abstracts/go.yaml'

          # Install yq for golangci-lint config merging
          - script: |
              sudo apt-get update && \
              sudo apt-get install -y yq
            displayName: 'Install yq'

          - script: $(Scripts.Directory)/global/scripts/languages/golang/golangci-lint/run.sh
            displayName: 'Run GolangCI-Lint'
