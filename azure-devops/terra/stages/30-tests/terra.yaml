stages:
  - stage: 'tests'
    displayName: 'tests'
    condition: and(succeeded(), not(startsWith(variables['Build.SourceBranch'], 'refs/tags/')))
    jobs:
      - job: 'test_all'
        displayName: 'test:all'
        steps:
          - template: '../../abstracts/terra.yaml'

          - script: |
              if [ -d "modules" ]; then
                for module in modules/*/; do
                  if [ -d "$$module/tests" ]; then
                    echo "Testing $$module...";
                    (cd "$$module" && terraform init -upgrade && terraform test) || exit 1;
                  else
                    echo "Skipping $${module%/} (no tests/ directory).";
                  fi;
                done;
                echo "All module tests passed.";
              else
                echo "No modules/ directory found, skipping tests.";
              fi
            displayName: 'Run Terraform module tests'
